[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session

# Custom markers. The `e2e` marker tags tests that boot the full Docker
# stack — they are slow (~3 min) and require Docker. They are SKIPPED by
# default. Run them explicitly with:
#     pytest -m e2e
#     tests/e2e/run.sh
markers =
    e2e: full-stack test that orchestrates docker compose (slow, opt-in)
    timeout: per-test timeout in seconds (requires pytest-timeout)
    mastio_strict: opt-out of the autouse mastio counter-sig bypass (ADR-009 Phase 4)
    serial: test that mutates shared state (audit chain seq, session
        store dict, JTI store, version git tag, ...) — historically
        flake-prone when run in parallel against the same on-disk
        artefact (SQLite file, source-checkout version probe).
        Marked tests pair with
        ``@pytest.mark.xdist_group(name="serial_state_mutators")``
        so that switching addopts to ``--dist=loadgroup`` (a future
        cross-suite refactor — quick win #5) lands all such tests on
        a single worker. Under the current ``--dist=loadfile``
        addopts the xdist_group marker is a no-op (same-file tests
        already co-locate), but the marker still enables
        ``pytest -m serial`` for ad-hoc serial runs. Audit
        2026-05-15 quick win #2.

# Skip the e2e marker by default. The unit suite still runs everything else.
# ``--dist=loadgroup`` work-steals at item level except for files marked with
# ``pytestmark = pytest.mark.xdist_group(name="serial_*")`` which stay colocated
# on a single worker. Cuts wall-clock by ~5x vs ``loadfile`` on 16-thread hosts
# by unblocking intra-file parallelism for files with N independent slow tests.
addopts = -m "not e2e" -n auto --dist=loadgroup
