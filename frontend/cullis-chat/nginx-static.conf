# Inner nginx for the cullis-chat static container (Dockerfile runtime
# stage). Serves the prerendered Astro output. The outer Frontdesk
# nginx layer (packaging/frontdesk-bundle/nginx/default.conf) takes care
# of the /api/session/* and /v1/* proxying and the security headers.
#
# Why two nginx layers? The static SPA has no /api/* of its own — those
# requests must go to the Connector. Doing the proxy here would couple
# this image to the Frontdesk topology; keeping it bare static lets the
# same image be reused in any deployment that wants to mount the SPA
# without committing to a specific Connector address.

server {
    listen 8080 default_server;
    server_name _;

    # Hide nginx version in error pages / Server header.
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # Long cache for hashed asset files (Astro emits content-hashed
    # filenames under /_astro/), no cache for the entry HTML so users
    # see code updates after a deploy.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        # SPA routing: any unknown path falls back to index.html so the
        # client-side router can take over.
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
