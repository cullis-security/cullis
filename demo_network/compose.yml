# Cullis demo network — smoke test topology
#
# 1 broker + 2 orgs (proxy-a, proxy-b) + sender + checker, fronted by Traefik
# with a test CA providing TLS on *.cullis.test subdomains. DNS for those
# subdomains is resolved inside the Docker network via service aliases on
# Traefik — no /etc/hosts editing needed.
#
# Golden path:  sender -> proxy-a -> broker -> proxy-b -> checker
# Smoke check:  curl https://checker.cullis.test:8443/last-message expects
#               the nonce that smoke.sh injected at `up`.
#
# NOTE: This is step 1 of the buildout — only ca-init, Traefik, and a dummy
# whoami service are wired up so TLS/DNS can be validated in isolation before
# broker/proxy/agents are added.

services:

  ca-init:
    build: ./ca-init
    volumes:
      - test-certs:/certs
    restart: "no"

  traefik:
    image: traefik:v3.1
    command:
      - --configfile=/etc/traefik/traefik.yml
    depends_on:
      ca-init:
        condition: service_completed_successfully
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - test-certs:/certs:ro
    ports:
      - "8443:8443"
    networks:
      default:
        aliases:
          - broker.cullis.test
          - proxy-a.cullis.test
          - proxy-b.cullis.test
          - checker.cullis.test
    # traefik:v3.1 base image has no shell/wget — rely on start_period + the
    # prober container to assert readiness.

  # ── Step 1 scaffold: dummy whoami services for every upstream so Traefik
  #    has something to route to. Replaced with real broker/proxy/checker
  #    in later steps.

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     atn
      POSTGRES_PASSWORD: atn-smoke
      POSTGRES_DB:       agent_trust
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atn -d agent_trust"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 20
      start_period: 2s

  vault:
    image: hashicorp/vault:1.17
    # Dev mode with a custom TLS listener. The cert is signed by the test
    # CA from ca-init, so broker only needs to trust /certs/ca.crt — no
    # CA bundle gymnastics needed.
    depends_on:
      ca-init:
        condition: service_completed_successfully
    command: ["server", "-dev"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "demo-vault-root-token"
      VAULT_LOCAL_CONFIG: >-
        {
          "listener": {
            "tcp": {
              "address": "0.0.0.0:8200",
              "tls_cert_file": "/certs/vault.crt",
              "tls_key_file":  "/certs/vault.key"
            }
          },
          "disable_mlock": true
        }
      VAULT_ADDR:   "https://127.0.0.1:8200"
      VAULT_CACERT: /certs/ca.crt
      # Dev mode insists on having its own listener — point it at an unused
      # localhost-only port. Real traffic goes through the HTTPS listener
      # defined in VAULT_LOCAL_CONFIG on 0.0.0.0:8200.
      VAULT_DEV_LISTEN_ADDRESS: "127.0.0.1:8299"
    cap_add:
      - IPC_LOCK
    volumes:
      - test-certs:/certs:ro
    healthcheck:
      test: ["CMD", "vault", "status", "-address=https://127.0.0.1:8200"]
      interval: 3s
      timeout: 2s
      retries: 30
      start_period: 5s

  vault-init:
    build: ./vault-init
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR:       "https://vault:8200"
      VAULT_CACERT:     /certs/ca.crt
      VAULT_ROOT_TOKEN: "demo-vault-root-token"
      TOKEN_OUT_DIR:    /vault-token
    volumes:
      - test-certs:/certs:ro
      - vault-token:/vault-token
    restart: "no"

  broker-init:
    build: ./broker-init
    depends_on:
      vault-init:
        condition: service_completed_successfully
    environment:
      VAULT_ADDR:        "https://vault:8200"
      VAULT_SECRET_PATH: "secret/data/broker"
      # Use the broker-scoped token issued by vault-init, not the root token.
      VAULT_TOKEN_FILE:  /vault-token/broker-token
      SSL_CERT_FILE:     /certs/ca.crt
      REQUESTS_CA_BUNDLE: /certs/ca.crt
      # PKI_KEY_TYPE propagates from the host shell (export PKI_KEY_TYPE=ec
      # before ./smoke.sh up) to generate the demo broker CA with ECDSA P-256
      # instead of the default RSA-4096. Used by the smoke-all-ecc CI variant.
      PKI_KEY_TYPE:      "${PKI_KEY_TYPE:-rsa}"
      # Pre-seed the admin password into Vault so the broker comes up
      # already past the /dashboard/setup wall. Keeps the smoke single-shot
      # (no interactive password pick) after the setup-first-no-login flow.
      # Long-term follow-up: expose a CLI/API that bypasses the UI setup
      # for CI/unattended deploys; for now we seed the backend directly.
      SEED_BROKER_ADMIN_PASSWORD: "demo-admin-secret-change-me"
    volumes:
      - broker-certs:/broker-certs
      - vault-token:/vault-token:ro
      - test-certs:/certs:ro
    restart: "no"

  broker:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      broker-init:
        condition: service_completed_successfully
      vault-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ADMIN_SECRET: "demo-admin-secret-change-me"
      # Fixed dashboard signing key so admin sessions survive broker restart
      # (A4 assertion). In prod this goes into a secrets manager.
      DASHBOARD_SIGNING_KEY: "demo-dashboard-signing-key-32chars-long-enough"
      BROKER_CA_KEY_PATH: /broker-certs/broker-ca-key.pem
      BROKER_CA_CERT_PATH: /broker-certs/broker-ca.pem
      # ADR-004 — agents reach the broker via proxy-{a,b}, whose DPoP proofs
      # claim htu=https://proxy-X.cullis.test:8443/... Leaving BROKER_PUBLIC_URL
      # empty lets build_htu fall back to the Host header, which the proxy
      # preserves via X-Forwarded-Host on forward (uvicorn --proxy-headers).
      # BROKER_PUBLIC_URL: "https://broker.cullis.test:8443"
      DATABASE_URL: "postgresql+asyncpg://atn:atn-smoke@postgres:5432/agent_trust"
      REDIS_URL: "redis://redis:6379"
      KMS_BACKEND: "vault"
      VAULT_ADDR: "https://vault:8200"
      VAULT_SECRET_PATH: "secret/data/broker"
      # HTTPS to Vault — no more ALLOW_HTTP.
      VAULT_ALLOW_HTTP: "false"
      POLICY_BACKEND: "webhook"
      POLICY_ENFORCEMENT: "true"
      # Smoke runs PDP webhooks inside the Docker network (172.x.x.x), so
      # the default SSRF guard against private IPs would block every call.
      POLICY_WEBHOOK_ALLOW_PRIVATE_IPS: "true"
      TRUST_DOMAIN: "cullis.test"
      OTEL_ENABLED: "false"
      FORWARDED_ALLOW_IPS: "172.16.0.0/12"
      ENVIRONMENT: "development"
      # Single trust anchor — both Vault (for KMS) and the proxy webhook
      # endpoints use certs signed by this demo CA.
      SSL_CERT_FILE: /certs/ca.crt
      REQUESTS_CA_BUNDLE: /certs/ca.crt
    volumes:
      - broker-certs:/broker-certs:ro
      - test-certs:/certs:ro
      - vault-token:/vault-token:ro
    # Read the narrow-scoped Vault token from a file and export it as env
    # before exec'ing uvicorn. The root token never touches this container.
    entrypoint: ["sh", "-c"]
    command:
      - |
        export VAULT_TOKEN="$$(cat /vault-token/broker-token)"
        exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1 --proxy-headers --forwarded-allow-ips 172.16.0.0/12
    expose: ["8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  proxy-a-init:
    build: ./proxy-init
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    environment:
      ORG_ID: "demo-org-a"
      # ADR-004 — reverse-proxy forwards directly to broker:8000 (no Traefik
      # in between), so X-Forwarded-* survive to the broker.
      BROKER_URL: "http://broker:8000"
      PROXY_PUBLIC_URL: "https://proxy-a.cullis.test:8443"
      PROXY_DB_PATH: /data/mcp_proxy.db
      STATE_DIR: /state
    volumes:
      - bootstrap-state:/state:ro
      - proxy-a-data:/data
    restart: "no"

  proxy-b-init:
    build: ./proxy-init
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    environment:
      ORG_ID: "demo-org-b"
      # ADR-004 — reverse-proxy → broker:8000 internal (no Traefik).
      BROKER_URL: "http://broker:8000"
      PROXY_PUBLIC_URL: "https://proxy-b.cullis.test:8443"
      PROXY_DB_PATH: /data/mcp_proxy.db
      STATE_DIR: /state
      # Exercise the PDP DENY branch: proxy-b refuses any session that
      # involves demo-org-a::banned-sender, on either side. Smoke asserts
      # that sender gets 403 when logging in as this agent.
      POLICY_RULES: '{"blocked_agents": ["demo-org-a::banned-sender"]}'
    volumes:
      - bootstrap-state:/state:ro
      - proxy-b-data:/data
    restart: "no"

  proxy-a:
    build:
      context: ..
      dockerfile: mcp_proxy/Dockerfile
    depends_on:
      proxy-a-init:
        condition: service_completed_successfully
    environment:
      # ADR-004 — reverse-proxy forwards directly to broker:8000 (bypasses
      # Traefik), so X-Forwarded-Host / -Proto survive to the broker's
      # --proxy-headers htu reconstruction.
      MCP_PROXY_BROKER_URL: "http://broker:8000"
      MCP_PROXY_BROKER_JWKS_URL: "http://broker:8000/.well-known/jwks.json"
      MCP_PROXY_PROXY_PUBLIC_URL: "https://proxy-a.cullis.test:8443"
      MCP_PROXY_ADMIN_SECRET: "demo-proxy-admin-a"
      MCP_PROXY_DATABASE_URL: "sqlite+aiosqlite:////data/mcp_proxy.db"
      MCP_PROXY_ORG_ID: "demo-org-a"
      MCP_PROXY_ALLOWED_ORIGINS: "https://proxy-a.cullis.test:8443"
      MCP_PROXY_ENVIRONMENT: "development"
      SSL_CERT_FILE: /certs/ca.crt
      REQUESTS_CA_BUNDLE: /certs/ca.crt
    volumes:
      - proxy-a-data:/data
      - test-certs:/certs:ro
    expose: ["9100"]

  proxy-b:
    build:
      context: ..
      dockerfile: mcp_proxy/Dockerfile
    depends_on:
      proxy-b-init:
        condition: service_completed_successfully
    environment:
      # ADR-004 — reverse-proxy → broker:8000 internal (no Traefik in between).
      MCP_PROXY_BROKER_URL: "http://broker:8000"
      MCP_PROXY_BROKER_JWKS_URL: "http://broker:8000/.well-known/jwks.json"
      MCP_PROXY_PROXY_PUBLIC_URL: "https://proxy-b.cullis.test:8443"
      MCP_PROXY_ADMIN_SECRET: "demo-proxy-admin-b"
      MCP_PROXY_DATABASE_URL: "sqlite+aiosqlite:////data/mcp_proxy.db"
      MCP_PROXY_ORG_ID: "demo-org-b"
      MCP_PROXY_ALLOWED_ORIGINS: "https://proxy-b.cullis.test:8443"
      MCP_PROXY_ENVIRONMENT: "development"
      SSL_CERT_FILE: /certs/ca.crt
      REQUESTS_CA_BUNDLE: /certs/ca.crt
    volumes:
      - proxy-b-data:/data
      - test-certs:/certs:ro
    expose: ["9100"]

  checker:
    build:
      context: ..
      dockerfile: demo_network/checker/Dockerfile
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    environment:
      # ADR-004 — checker reaches the broker via proxy-b (reverse-proxy).
      BROKER_URL:       "https://proxy-b.cullis.test:8443"
      AGENT_ID:         "demo-org-b::checker"
      ORG_ID:           "demo-org-b"
      AGENT_CERT_PATH:  /state/demo-org-b/checker.pem
      AGENT_KEY_PATH:   /state/demo-org-b/checker-key.pem
      CA_BUNDLE:        /certs/ca.crt
      PORT:             "9000"
    volumes:
      - bootstrap-state:/state:ro
      - test-certs:/certs:ro
    expose: ["9000"]

  sender:
    build:
      context: ..
      dockerfile: demo_network/sender/Dockerfile
    depends_on:
      checker:
        condition: service_healthy
      broker:
        condition: service_healthy
    environment:
      # ADR-004 — sender reaches the broker via proxy-a (reverse-proxy).
      BROKER_URL:              "https://proxy-a.cullis.test:8443"
      AGENT_ID:                "demo-org-a::sender"
      ORG_ID:                  "demo-org-a"
      PEER_AGENT_ID:           "demo-org-b::checker"
      PEER_ORG_ID:             "demo-org-b"
      AGENT_CERT_PATH:         /state/demo-org-a/sender.pem
      AGENT_KEY_PATH:          /state/demo-org-a/sender-key.pem
      CA_BUNDLE:               /certs/ca.crt
      SMOKE_NONCE:             "${SMOKE_NONCE:-nonce-unset}"
      # Phase 2 — banned agent for the PDP DENY assertion.
      BANNED_AGENT_ID:         "demo-org-a::banned-sender"
      BANNED_AGENT_CERT_PATH:  /state/demo-org-a/banned-sender.pem
      BANNED_AGENT_KEY_PATH:   /state/demo-org-a/banned-sender-key.pem
      # Phase 3 — revoked-cert agent for the A5 assertion.
      REVOKED_AGENT_ID:        "demo-org-a::revoked-agent"
      REVOKED_AGENT_CERT_PATH: /state/demo-org-a/revoked-agent.pem
      REVOKED_AGENT_KEY_PATH:  /state/demo-org-a/revoked-agent-key.pem
      # Phase 4 — agent with revoked binding for the A6 assertion.
      UNBOUND_AGENT_ID:        "demo-org-a::unbound-agent"
      UNBOUND_AGENT_CERT_PATH: /state/demo-org-a/unbound-agent.pem
      UNBOUND_AGENT_KEY_PATH:  /state/demo-org-a/unbound-agent-key.pem
      # Phase 5 — MCP Proxy ingress call for the A8 assertion.
      INGRESS_URL:             "https://proxy-a.cullis.test:8443/v1/ingress/tools"
    volumes:
      - bootstrap-state:/state:ro
      - test-certs:/certs:ro
    restart: "no"

  # One-shot: registers 2 orgs on the broker (one via /join, one via
  # /attach-ca) so both onboarding paths are exercised on every smoke run.
  bootstrap:
    build: ./bootstrap
    depends_on:
      broker:
        condition: service_healthy
    environment:
      BROKER_URL: "https://broker.cullis.test:8443"
      ADMIN_SECRET: "demo-admin-secret-change-me"
      CA_BUNDLE: /certs/ca.crt
      STATE_DIR: /state
      PKI_KEY_TYPE: "${PKI_KEY_TYPE:-rsa}"
    volumes:
      - test-certs:/certs:ro
      - bootstrap-state:/state
    restart: "no"

  # One-shot prober that validates TLS routing from inside the network.
  # Exits 0 iff all four subdomains respond through Traefik with the test CA.
  prober:
    image: curlimages/curl:8.10.1
    depends_on:
      traefik:
        condition: service_started
      broker:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
      proxy-a:
        condition: service_healthy
      proxy-b:
        condition: service_healthy
      checker:
        condition: service_started
    volumes:
      - test-certs:/certs:ro
    entrypoint:
      - sh
      - -euxc
      - |
        # Broker has a real /health; whoami backends serve 200 on /.
        probe() {
          local host="$1" path="$2"
          curl --fail --silent --show-error \
               --retry 30 --retry-delay 2 --retry-all-errors \
               --cacert /certs/ca.crt \
               "https://$${host}.cullis.test:8443$${path}" > /dev/null \
               || { echo "prober: FAILED reaching $${host}.cullis.test$${path}"; exit 1; }
        }
        probe broker  /health
        probe proxy-a /health
        probe proxy-b /health
        probe checker /
        echo "prober: all four hosts reachable via Traefik with test CA"

volumes:
  test-certs:
  broker-certs:
  bootstrap-state:
  proxy-a-data:
  proxy-b-data:
  postgres-data:
  vault-token:

networks:
  default:
    name: cullis-demo-net
