<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cullis{% endblock %} — Cullis Court</title>
    <link rel="stylesheet" href="/static/css/tailwind.css">
    <script src="/static/vendor/htmx.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="h-full">
<div class="flex h-full">

    <!-- Sidebar -->
    <nav class="w-56 flex-shrink-0 bg-surface-900 border-r border-gray-800/60 flex flex-col">
        <!-- Brand -->
        <div class="px-4 py-5 border-b border-gray-800/60">
            <div class="flex items-center gap-2.5 mb-1">
                <img src="/static/cullis.svg" alt="Cullis" style="height: 26px; width: auto; filter: drop-shadow(0 0 10px rgba(0,229,199,0.25));">
                <span class="font-heading font-semibold text-sm text-white uppercase tracking-[0.18em]">Cullis</span>
            </div>
            <div class="flex items-center gap-2 mt-1.5">
                <span class="inline-block font-heading text-[9px] font-semibold uppercase tracking-[0.22em] px-1.5 py-0.5 rounded-sm bg-accent-400/10 text-accent-400 border border-accent-400/20">Court</span>
                <span class="text-[10px] text-gray-600 uppercase tracking-wider">Cross-Org Federation</span>
            </div>
        </div>

        <!-- Navigation -->
        <div class="flex-1 px-2 py-3 space-y-0.5">
            <a href="/dashboard"
               class="flex items-center gap-2.5 px-3 py-2 rounded text-sm nav-item {% if active == 'overview' %}nav-active{% else %}text-gray-500{% endif %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
                Overview
            </a>
            <a href="/dashboard/orgs"
               class="flex items-center gap-2.5 px-3 py-2 rounded text-sm nav-item {% if active == 'orgs' %}nav-active{% else %}text-gray-500{% endif %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                Organizations
                <span hx-get="/dashboard/badge/pending-orgs" hx-trigger="load, every 10s" hx-swap="innerHTML" class="ml-auto"></span>
            </a>
            <a href="/dashboard/agents"
               class="flex items-center gap-2.5 px-3 py-2 rounded text-sm nav-item {% if active == 'agents' %}nav-active{% else %}text-gray-500{% endif %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                Agents
            </a>
            <a href="/dashboard/sessions"
               class="flex items-center gap-2.5 px-3 py-2 rounded text-sm nav-item {% if active == 'sessions' %}nav-active{% else %}text-gray-500{% endif %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                Sessions
                <span hx-get="/dashboard/badge/pending-sessions" hx-trigger="load, every 10s" hx-swap="innerHTML" class="ml-auto"></span>
            </a>
            <a href="/dashboard/rfqs"
               class="flex items-center gap-2.5 px-3 py-2 rounded text-sm nav-item {% if active == 'rfq' %}nav-active{% else %}text-gray-500{% endif %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
                RFQs
            </a>
            <a href="/dashboard/policies"
               class="flex items-center gap-2.5 px-3 py-2 rounded text-sm nav-item {% if active == 'policies' %}nav-active{% else %}text-gray-500{% endif %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                Policies
            </a>
            <a href="/dashboard/admin/settings"
               class="flex items-center gap-2.5 px-3 py-2 rounded text-sm nav-item {% if active == 'admin_settings' %}nav-active{% else %}text-gray-500{% endif %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                Settings
            </a>
            <a href="/dashboard/audit"
               class="flex items-center gap-2.5 px-3 py-2 rounded text-sm nav-item {% if active == 'audit' %}nav-active{% else %}text-gray-500{% endif %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                Audit Log
            </a>
            <a href="{{ jaeger_url or 'http://localhost:16686' }}" target="_blank" rel="noopener"
               class="flex items-center gap-2.5 px-3 py-2 rounded text-sm nav-item text-gray-500">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                Traces
                <svg class="w-3 h-3 ml-auto text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
            </a>
        </div>

        <!-- Footer status -->
        <div class="px-4 py-3 border-t border-gray-800/60 space-y-2">
            <div class="flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-accent-400 pulse-dot"></span>
                <span class="text-[10px] text-gray-600 uppercase tracking-wider">Court Online</span>
            </div>
            <div class="flex items-center gap-2">
                <span id="sse-dot" class="w-1.5 h-1.5 rounded-full bg-gray-700"></span>
                <span id="sse-label" class="text-[10px] text-gray-600 uppercase tracking-wider">Connecting</span>
            </div>
        </div>
    </nav>

    <!-- Main content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <!-- Top bar -->
        {% if session and session.logged_in %}
        <header class="flex items-center justify-between px-6 py-3 border-b border-gray-800/60 bg-surface-950">
            <div class="flex items-center gap-3">
                <h1 class="font-heading text-sm font-semibold text-white uppercase tracking-wider">{% block header_title %}Court{% endblock %}</h1>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-[10px] text-gray-600 uppercase tracking-wider">Admin</span>
                <span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded bg-accent-400/10 text-accent-400 text-[10px] font-medium uppercase tracking-wider">
                    <span class="w-1.5 h-1.5 rounded-full bg-accent-400 pulse-dot"></span>
                    Network Admin
                </span>
                <form method="post" action="/dashboard/logout" class="inline">
                    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
                    <button type="submit" class="text-[10px] text-gray-500 hover:text-gray-300 border border-gray-700/60 hover:border-gray-600 rounded px-2.5 py-1 uppercase tracking-wider transition-colors">Logout</button>
                </form>
            </div>
        </header>
        {% endif %}
        <main class="flex-1 overflow-y-auto p-6">
            {% block content %}{% endblock %}
        </main>
    </div>

</div>

<!-- Toast container -->
<div id="toast-container" class="toast-container"></div>

<script>
function showToast(message, type) {
    var container = document.getElementById('toast-container');
    var toast = document.createElement('div');
    var colors = type === 'success'
        ? 'bg-emerald-900/90 border-emerald-700/50 text-emerald-300'
        : 'bg-red-900/90 border-red-700/50 text-red-300';
    toast.className = 'toast-enter mb-2 px-4 py-3 rounded border backdrop-blur-sm text-sm ' + colors;
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(function() { toast.remove(); }, 4000);
}

function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(function() {
        showToast('Copied to clipboard', 'success');
    });
}

(function() {
    var dot = document.getElementById('sse-dot');
    var label = document.getElementById('sse-label');
    if (!dot) return; // not logged in

    var es = null;
    var debounce = null;

    function setStatus(connected) {
        dot.className = 'w-1.5 h-1.5 rounded-full ' + (connected
            ? 'bg-accent-400 pulse-dot'
            : 'bg-gray-700');
        label.textContent = connected ? 'Live' : 'Reconnecting';
        label.className = 'text-[10px] uppercase tracking-wider ' + (connected ? 'text-gray-500' : 'text-gray-700');
    }

    function connect() {
        if (es) { es.close(); }
        es = new EventSource('/dashboard/sse');

        es.addEventListener('connected', function() {
            setStatus(true);
        });

        es.addEventListener('update', function(e) {
            var data = JSON.parse(e.data);
            var el = document.getElementById('page-content');
            if (!el) return;
            var page = el.getAttribute('data-sse-page');
            if (!page) return;
            // Only refresh if this event is relevant to the current page
            if (data.categories && data.categories.indexOf(page) === -1) return;

            // Debounce: batch rapid events into a single refresh
            if (debounce) clearTimeout(debounce);
            debounce = setTimeout(function() {
                htmx.ajax('GET', window.location.href, {
                    target: '#page-content',
                    select: '#page-content',
                    swap: 'outerHTML'
                });
            }, 300);
        });

        es.onerror = function() {
            setStatus(false);
            es.close();
            // Reconnect after 3s
            setTimeout(connect, 3000);
        };
    }

    connect();
})();
</script>
</body>
</html>
