<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Cullis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { brand: { 500:'#6366f1', 600:'#4f46e5', 700:'#4338ca' } } } }
        }
    </script>
</head>
<body class="h-full flex items-center justify-center">
<!-- Subtle radial glow behind the card -->
<div style="position:fixed;top:50%;left:50%;width:600px;height:600px;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(99,102,241,0.08) 0%,transparent 70%);pointer-events:none;z-index:0;"></div>

<div class="w-full max-w-md relative z-10">
    <!-- Logo & Branding -->
    <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center mb-4">
            <svg width="56" height="56" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Shield body -->
                <path d="M28 4L8 14v14c0 12.4 8.5 24 20 28 11.5-4 20-15.6 20-28V14L28 4z" fill="rgba(99,102,241,0.12)" stroke="#6366f1" stroke-width="1.5"/>
                <!-- Network nodes -->
                <circle cx="28" cy="22" r="3.5" fill="#6366f1"/>
                <circle cx="18" cy="34" r="2.5" fill="#6366f1" opacity="0.7"/>
                <circle cx="38" cy="34" r="2.5" fill="#6366f1" opacity="0.7"/>
                <circle cx="28" cy="42" r="2" fill="#6366f1" opacity="0.5"/>
                <!-- Network edges -->
                <line x1="28" y1="25.5" x2="18" y2="31.5" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
                <line x1="28" y1="25.5" x2="38" y2="31.5" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
                <line x1="18" y1="36.5" x2="28" y2="40" stroke="#6366f1" stroke-width="1" opacity="0.35"/>
                <line x1="38" y1="36.5" x2="28" y2="40" stroke="#6366f1" stroke-width="1" opacity="0.35"/>
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-white tracking-wide">Cullis</h1>
        <p class="text-sm text-gray-500 mt-1.5">Zero-trust identity for AI agents</p>
    </div>

    {% if error %}
    <div class="mb-4 p-3 bg-red-500/10 border border-red-500/30 rounded-md text-sm text-red-400">{{ error }}</div>
    {% endif %}

    <!-- Card container -->
    <div class="bg-gray-900/60 border border-gray-800 rounded-xl p-6 backdrop-blur-sm" style="box-shadow:0 0 40px rgba(99,102,241,0.04);">
        <form method="post" action="/dashboard/login" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">User</label>
                <input type="text" name="user_id" required placeholder="Enter your user ID"
                       class="w-full bg-gray-950 border border-gray-700 rounded-md px-3 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500/30 transition-colors">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                <input type="password" name="password" required placeholder="Enter your password"
                       class="w-full bg-gray-950 border border-gray-700 rounded-md px-3 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500/30 transition-colors">
            </div>
            <button type="submit" class="w-full px-4 py-2.5 bg-brand-600 hover:bg-brand-700 text-white text-sm font-medium rounded-md transition-colors">
                Login
            </button>
        </form>
    </div>

    <div class="mt-5">
        <a href="/dashboard/register"
           class="block w-full px-4 py-2.5 text-center text-sm font-medium text-brand-400 border border-brand-500/30 hover:bg-brand-500/10 rounded-md transition-colors">
            New organization? Register here
        </a>
    </div>
</div>
</body>
</html>
