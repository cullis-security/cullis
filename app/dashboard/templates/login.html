<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Cullis Trust Broker</title>
    <link rel="stylesheet" href="/static/css/tailwind.css">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body class="h-full flex items-center justify-center">

<!-- Background radial glow -->
<div class="glow-pulse" style="position:fixed;top:50%;left:50%;width:700px;height:700px;transform:translate(-50%,-50%);background:radial-gradient(circle, rgba(0,229,199,0.05) 0%, rgba(14,165,233,0.02) 40%, transparent 70%);pointer-events:none;z-index:0;"></div>

<!-- Grid pattern overlay -->
<div style="position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;"></div>

<div class="w-full max-w-md relative z-10 fade-up">
    <!-- Brand -->
    <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center gap-3 mb-3">
            <img src="/static/cullis.svg" alt="Cullis" style="height: 48px; width: auto; filter: drop-shadow(0 0 18px rgba(0,229,199,0.3));">
        </div>
        <h1 style="font-family: 'Chakra Petch', sans-serif; font-weight: 600; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 0.2em; color: white;">
            Cullis
        </h1>
        <p class="text-xs text-gray-600 mt-2 uppercase tracking-[0.15em]">Federated Trust Broker</p>
    </div>

    {% if error %}
    <div class="mb-4 p-3 bg-red-500/10 border border-red-500/20 rounded text-sm text-red-400">{{ error }}</div>
    {% endif %}

    <!-- Login card -->
    <div class="bg-surface-900/60 border border-gray-800/50 rounded-lg p-6 backdrop-blur-sm" style="box-shadow: 0 0 40px rgba(0,229,199,0.03);">
        <form method="post" action="/dashboard/login" class="space-y-5">
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5 uppercase tracking-wider">User</label>
                <input type="text" name="user_id" required autocomplete="username"
                       placeholder="Enter your user ID"
                       class="w-full bg-surface-950 border border-gray-700/60 rounded px-3 py-2.5 text-sm text-white placeholder-gray-600 transition-all">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5 uppercase tracking-wider">Password</label>
                <input type="password" name="password" required autocomplete="current-password"
                       placeholder="Enter your password"
                       class="w-full bg-surface-950 border border-gray-700/60 rounded px-3 py-2.5 text-sm text-white placeholder-gray-600 transition-all">
            </div>
            <button type="submit"
                    class="w-full px-4 py-3 text-sm font-semibold rounded transition-all"
                    style="font-family: 'Chakra Petch', sans-serif; background: #00e5c7; color: #0a0f1a; letter-spacing: 0.08em; text-transform: uppercase;"
                    onmouseover="this.style.background='#fff'; this.style.boxShadow='0 0 30px rgba(0,229,199,0.2)'; this.style.transform='translateY(-1px)'"
                    onmouseout="this.style.background='#00e5c7'; this.style.boxShadow='none'; this.style.transform='none'">
                Login
            </button>
        </form>
    </div>

    <div class="mt-5">
        <a href="/dashboard/register"
           class="block w-full px-4 py-2.5 text-center text-xs font-medium text-accent-400 border border-accent-400/30 hover:bg-accent-400/10 rounded uppercase tracking-wider transition-colors">
            New organization? Register here
        </a>
    </div>

    <p class="text-center text-[10px] text-gray-700 mt-8 uppercase tracking-widest">
        Cullis Agent Trust Network
    </p>
</div>
</body>
</html>
