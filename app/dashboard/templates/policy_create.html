{% extends "base.html" %}
{% block title %}Create Session Policy{% endblock %}
{% block content %}
<div class="max-w-2xl">
    <a href="/dashboard/policies" class="text-sm text-gray-500 hover:text-gray-300 mb-4 inline-block">&larr; Back to Policies</a>
    <h2 class="text-2xl font-bold text-white mb-6">Create Session Policy</h2>

    {% if error %}
    <div class="mb-4 p-3 bg-red-500/10 border border-red-500/30 rounded-md text-sm text-red-400">{{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="mb-4 p-3 bg-emerald-500/10 border border-emerald-500/30 rounded-md text-sm text-emerald-400">{{ success }}</div>
    {% endif %}

    <form method="post" action="/dashboard/policies/create" class="space-y-5">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div>
            <label class="block text-sm font-medium text-gray-300 mb-1">Organization (who is allowed to initiate)</label>
            <select name="org_id" required
                    class="w-full bg-gray-900 border border-gray-700 rounded-md px-3 py-2 text-sm text-white focus:outline-none focus:border-brand-500">
                <option value="">Select organization...</option>
                {% for org in orgs %}
                <option value="{{ org.org_id }}" {% if form.org_id == org.org_id %}selected{% endif %}>{{ org.org_id }} ({{ org.display_name }})</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-300 mb-1">Target Organization (who they can talk to)</label>
            <select name="target_org_id" required
                    class="w-full bg-gray-900 border border-gray-700 rounded-md px-3 py-2 text-sm text-white focus:outline-none focus:border-brand-500">
                <option value="">Select target organization...</option>
                {% for org in orgs %}
                <option value="{{ org.org_id }}" {% if form.target_org_id == org.org_id %}selected{% endif %}>{{ org.org_id }} ({{ org.display_name }})</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-300 mb-1">Capabilities</label>
            <input type="text" name="capabilities" placeholder="order.read, order.write" value="{{ form.capabilities or '' }}"
                   class="w-full bg-gray-900 border border-gray-700 rounded-md px-3 py-2 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-brand-500">
            <p class="text-xs text-gray-600 mt-1">Comma-separated. Leave empty to allow all capabilities.</p>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-300 mb-1">Effect</label>
            <div class="flex gap-4 mt-1">
                <label class="flex items-center gap-2 text-sm text-gray-300">
                    <input type="radio" name="effect" value="allow" {% if not form.effect or form.effect == 'allow' %}checked{% endif %}
                           class="text-brand-500 focus:ring-brand-500">
                    Allow
                </label>
                <label class="flex items-center gap-2 text-sm text-gray-300">
                    <input type="radio" name="effect" value="deny" {% if form.effect == 'deny' %}checked{% endif %}
                           class="text-red-500 focus:ring-red-500">
                    Deny
                </label>
            </div>
        </div>
        <button type="submit"
                class="px-4 py-2 bg-brand-600 hover:bg-brand-700 text-white text-sm rounded-md">
            Create Policy
        </button>
    </form>
</div>
{% endblock %}
