# VM1 — ATN Broker (DMZ / Neutral Zone)
#
# Core trust infrastructure. Accessible from VM2 and VM3.
# VM2 and VM3 cannot talk to each other — only through this broker.
#
# Ports exposed:
#   8443  — HTTPS (nginx reverse proxy, TLS)
#   8000  — HTTP  (broker direct, dev only)
#   16686 — Jaeger UI (traces)

services:

  broker:
    build:
      context: ../../
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql+asyncpg://atn:atn@postgres:5432/atn
      - REDIS_URL=redis://redis:6379/0
      - KMS_BACKEND=vault
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=dev-root-token
      - ADMIN_SECRET=${ATN_ADMIN_SECRET:-trustlink-admin-2026}
      - BROKER_PUBLIC_URL=https://${BROKER_HOST:-localhost}:8443
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - LOG_FORMAT=json
      - POLICY_BACKEND=opa
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/healthz').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: atn
      POSTGRES_USER: atn
      POSTGRES_PASSWORD: atn
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atn"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  vault:
    image: hashicorp/vault:1.17
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK

  nginx:
    image: nginx:alpine
    ports:
      - "8443:8443"
    volumes:
      - ../../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../certs/broker:/etc/nginx/certs:ro
    depends_on:
      - broker

  jaeger:
    image: jaegertracing/all-in-one:1.62
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC

volumes:
  pg-data:
