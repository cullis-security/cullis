<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %} — Cullis Mastio</title>
    <link rel="icon" type="image/svg+xml" href="/static/cullis-mark.svg">
    <link rel="stylesheet" href="/static/css/tailwind.css">
    <script src="/static/vendor/htmx.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="h-full">
<div class="flex h-full">

    <!-- Sidebar -->
    <nav class="w-56 flex-shrink-0 bg-surface-900 border-r border-gray-800/60 flex flex-col">
        <!-- Brand -->
        <div class="px-4 py-5 border-b border-gray-800/60">
            <div class="flex items-center gap-2.5 mb-1">
                <img src="/static/cullis-mark.svg" alt="Cullis" style="height: 26px; width: auto; filter: drop-shadow(0 0 10px rgba(0,229,199,0.25));">
                <span class="font-heading font-semibold text-sm text-white uppercase tracking-[0.18em]">Cullis</span>
            </div>
            <div class="flex items-center gap-2 mt-1.5">
                <span class="inline-block font-heading text-[9px] font-semibold uppercase tracking-[0.22em] px-1.5 py-0.5 rounded-sm bg-accent-400/10 text-accent-400 border border-accent-400/20">Mastio</span>
                <span class="text-[10px] text-gray-600 uppercase tracking-wider">Org Trust Authority</span>
            </div>
        </div>

        <!-- Navigation -->
        <div class="flex-1 px-2 py-3 space-y-0.5">
            <a href="/proxy/overview"
               class="flex items-center gap-2.5 px-3 py-2 rounded text-sm nav-item {% if active == 'overview' %}nav-active{% else %}text-gray-500{% endif %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                Overview
            </a>
            <a href="/proxy/setup"
               class="flex items-center gap-2.5 px-3 py-2 rounded text-sm nav-item {% if active == 'setup' %}nav-active{% else %}text-gray-500{% endif %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                Setup
            </a>
            <a href="/proxy/agents"
               class="flex items-center gap-2.5 px-3 py-2 rounded text-sm nav-item {% if active == 'agents' %}nav-active{% else %}text-gray-500{% endif %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                Agents
                <span hx-get="/proxy/badge/agents" hx-trigger="load, every 10s" hx-swap="innerHTML" class="ml-auto"></span>
            </a>
            <a href="/proxy/enrollments"
               class="flex items-center gap-2.5 px-3 py-2 rounded text-sm nav-item {% if active == 'enrollments' %}nav-active{% else %}text-gray-500{% endif %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
                Enrollments
                <span hx-get="/proxy/badge/enrollments" hx-trigger="load, every 10s" hx-swap="innerHTML" class="ml-auto"></span>
            </a>
            <a href="/proxy/network"
               class="flex items-center gap-2.5 px-3 py-2 rounded text-sm nav-item {% if active == 'network' %}nav-active{% else %}text-gray-500{% endif %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                Network
            </a>
            <a href="/proxy/tools"
               class="flex items-center gap-2.5 px-3 py-2 rounded text-sm nav-item {% if active == 'tools' %}nav-active{% else %}text-gray-500{% endif %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 4a2 2 0 114 0v1a1 1 0 001 1h3a1 1 0 011 1v3a1 1 0 01-1 1h-1a2 2 0 100 4h1a1 1 0 011 1v3a1 1 0 01-1 1h-3a1 1 0 01-1-1v-1a2 2 0 10-4 0v1a1 1 0 01-1 1H7a1 1 0 01-1-1v-3a1 1 0 00-1-1H4a2 2 0 110-4h1a1 1 0 001-1V7a1 1 0 011-1h3a1 1 0 001-1V4z"/></svg>
                Tools
            </a>
            <a href="/proxy/backends"
               class="flex items-center gap-2.5 px-3 py-2 rounded text-sm nav-item {% if active == 'backends' %}nav-active{% else %}text-gray-500{% endif %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"/></svg>
                Backends
            </a>
            <a href="/proxy/pki"
               class="flex items-center gap-2.5 px-3 py-2 rounded text-sm nav-item {% if active == 'pki' %}nav-active{% else %}text-gray-500{% endif %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" fill="currentColor" stroke="none"/></svg>
                PKI
            </a>
            <a href="/proxy/mastio-key"
               class="flex items-center gap-2.5 px-3 py-2 rounded text-sm nav-item {% if active == 'mastio_key' %}nav-active{% else %}text-gray-500{% endif %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
                Signing Key
            </a>
            <a href="/proxy/updates"
               class="flex items-center gap-2.5 px-3 py-2 rounded text-sm nav-item {% if active == 'updates' %}nav-active{% else %}text-gray-500{% endif %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                Updates
                <span hx-get="/proxy/badge/updates" hx-trigger="load, every 10s" hx-swap="innerHTML" class="ml-auto"></span>
            </a>
            <a href="/proxy/vault"
               class="flex items-center gap-2.5 px-3 py-2 rounded text-sm nav-item {% if active == 'vault' %}nav-active{% else %}text-gray-500{% endif %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                Vault
            </a>
            <a href="/proxy/policies"
               class="flex items-center gap-2.5 px-3 py-2 rounded text-sm nav-item {% if active == 'policies' %}nav-active{% else %}text-gray-500{% endif %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                Policies
            </a>
            <a href="/proxy/audit"
               class="flex items-center gap-2.5 px-3 py-2 rounded text-sm nav-item {% if active == 'audit' %}nav-active{% else %}text-gray-500{% endif %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                Audit Log
                <span hx-get="/proxy/badge/audit" hx-trigger="load, every 10s" hx-swap="innerHTML" class="ml-auto"></span>
            </a>
            <a href="/proxy/settings"
               class="flex items-center gap-2.5 px-3 py-2 rounded text-sm nav-item {% if active == 'settings' %}nav-active{% else %}text-gray-500{% endif %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg>
                Settings
            </a>
        </div>

        <!-- Footer status -->
        <div class="px-4 py-3 border-t border-gray-800/60 space-y-2">
            <div class="flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-accent-400 pulse-dot"></span>
                <span class="text-[10px] text-gray-600 uppercase tracking-wider">Mastio Online</span>
            </div>
            <form method="post" action="/proxy/logout" class="inline">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <button type="submit"
                   class="flex items-center gap-2 px-2 py-1.5 rounded text-xs text-gray-500 hover:text-gray-300 hover:bg-gray-800/50 transition-colors">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    Logout
                </button>
            </form>
        </div>
    </nav>

    <!-- Main content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <!-- Top bar -->
        <header class="flex items-center justify-between px-6 py-3 border-b border-gray-800/60 bg-surface-950">
            <div class="flex items-center gap-3">
                <h1 class="font-heading text-sm font-semibold text-white uppercase tracking-wider">{% block header_title %}Mastio{% endblock %}</h1>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-[10px] text-gray-600 uppercase tracking-wider">Admin</span>
                <span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded bg-accent-400/10 text-accent-400 text-[10px] font-medium uppercase tracking-wider">
                    <span class="w-1.5 h-1.5 rounded-full bg-accent-400 pulse-dot"></span>
                    Online
                </span>
            </div>
        </header>

        <!-- Org status banner (HTMX auto-polling) -->
        <div id="org-status-banner"
             hx-get="/proxy/org-status"
             hx-trigger="load, every 10s"
             hx-swap="innerHTML"></div>

        <main class="flex-1 overflow-y-auto p-6">
            {% block content %}{% endblock %}
        </main>
    </div>
</div>

<!-- Toast container -->
<div id="toast-container" class="toast-container"></div>

<script>
function showToast(message, type) {
    var container = document.getElementById('toast-container');
    var toast = document.createElement('div');
    var colors = type === 'success'
        ? 'bg-emerald-900/90 border-emerald-700/50 text-emerald-300'
        : 'bg-red-900/90 border-red-700/50 text-red-300';
    toast.className = 'toast-enter mb-2 px-4 py-3 rounded border backdrop-blur-sm text-sm ' + colors;
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(function() { toast.remove(); }, 4000);
}

function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(function() {
        showToast('Copied to clipboard', 'success');
    });
}
</script>
</body>
</html>
