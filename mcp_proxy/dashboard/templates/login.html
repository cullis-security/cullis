<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — Cullis MCP Proxy</title>
    <link rel="stylesheet" href="/static/css/tailwind.css">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* Login-specific animation overrides */
        .fade-up { animation: fade-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) both; }
        .delay-100 { animation-delay: 0.08s; }
        .delay-200 { animation-delay: 0.16s; }
        @keyframes status-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
        .status-dot { animation: status-blink 1.6s ease-in-out infinite; }
        .accent-line {
            background: linear-gradient(90deg, transparent 0%, rgba(0,229,199,0.55) 50%, transparent 100%);
        }
    </style>
</head>
<body class="h-full flex items-center justify-center">

<!-- Background radial glow -->
<div class="glow-pulse" style="position:fixed;top:50%;left:50%;width:720px;height:720px;transform:translate(-50%,-50%);background:radial-gradient(circle, rgba(0,229,199,0.06) 0%, rgba(14,165,233,0.02) 40%, transparent 70%);pointer-events:none;z-index:0;"></div>

<!-- Grid pattern overlay -->
<div style="position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;"></div>

<div class="w-full max-w-md relative z-10 px-6">

    <!-- Brand block -->
    <div class="text-center mb-10 fade-up">
        <div class="inline-flex items-center justify-center mb-4">
            <div class="w-12 h-12 rounded-lg bg-surface-900 border border-gray-800/60 flex items-center justify-center" style="box-shadow: 0 0 32px rgba(0,229,199,0.10);">
                <svg class="w-6 h-6" style="color: #00e5c7;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"/>
                </svg>
            </div>
        </div>
        <h1 style="font-family: 'Chakra Petch', sans-serif; font-weight: 600; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 0.2em; color: white;">
            Cullis <span style="color: #00e5c7;">MCP</span> Proxy
        </h1>
        <div class="accent-line h-px w-24 mx-auto mt-3 mb-3"></div>
        <p class="text-[10px] text-gray-500 uppercase tracking-[0.22em]">Enterprise Control Plane</p>
    </div>

    {% if error %}
    <div class="mb-4 p-3 bg-red-500/10 border border-red-500/20 rounded text-sm text-red-400 fade-up delay-100">
        {{ error }}
    </div>
    {% endif %}

    <!-- Sign-in card -->
    <div class="bg-surface-900/60 border border-gray-800/50 rounded-lg p-7 backdrop-blur-sm fade-up delay-100"
         style="box-shadow: 0 0 60px rgba(0,229,199,0.04), 0 8px 32px rgba(0,0,0,0.4);">

        <div class="mb-6">
            <h2 class="text-white text-base font-semibold" style="font-family: 'Chakra Petch', sans-serif; letter-spacing: 0.06em;">
                Sign in
            </h2>
            <p class="text-xs text-gray-500 mt-1">Enter the admin password to access the dashboard.</p>
        </div>

        <form method="post" action="/proxy/login" class="space-y-5">
            <div>
                <label class="block text-[10px] font-medium text-gray-500 mb-1.5 uppercase tracking-[0.15em]">
                    Admin password
                </label>
                <input type="password" name="password" required autofocus autocomplete="current-password"
                       placeholder="••••••••"
                       class="w-full bg-surface-950 border border-gray-700/60 rounded px-3 py-2.5 text-sm text-white placeholder-gray-700 transition-all"
                       style="font-family: 'JetBrains Mono', monospace; letter-spacing: 0.05em;">
            </div>

            <button type="submit"
                    class="w-full px-4 py-3 text-sm font-semibold rounded transition-all"
                    style="font-family: 'Chakra Petch', sans-serif; background: #00e5c7; color: #0a0f1a; letter-spacing: 0.1em; text-transform: uppercase;"
                    onmouseover="this.style.background='#fff'; this.style.boxShadow='0 0 32px rgba(0,229,199,0.25)'; this.style.transform='translateY(-1px)'"
                    onmouseout="this.style.background='#00e5c7'; this.style.boxShadow='none'; this.style.transform='none'">
                Sign In &rarr;
            </button>
        </form>
    </div>

    <!-- Status footer -->
    <div class="mt-8 text-center fade-up delay-200">
        <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full border border-gray-800/60 bg-surface-900/40">
            <span class="status-dot inline-block w-1.5 h-1.5 rounded-full" style="background: #00e5c7; box-shadow: 0 0 6px rgba(0,229,199,0.7);"></span>
            <span class="text-[10px] uppercase tracking-[0.18em] text-gray-500" style="font-family: 'JetBrains Mono', monospace;">
                Standby &middot; awaiting credentials
            </span>
        </div>
    </div>

</div>
</body>
</html>
