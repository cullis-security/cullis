name: helm-test

# Helm chart deployment gate. Complements the smoke workflow:
#   - smoke validates BEHAVIOR (A1-A8 inside docker-compose)
#   - helm-test validates DEPLOYMENT PLUMBING (lint, template, install
#     on kind, /healthz + /readyz respond)
#
# These are intentionally non-overlapping. helm-test does not re-run
# the smoke assertions — that's the smoke workflow's job on the
# docker stack. helm-test only asserts that the chart materialises
# into a cluster correctly.
#
# Runs on every PR so the required status check always reports. When
# no files under deploy/helm/** changed, the heavy kind cluster
# creation is skipped and the check reports success.

on:
  push:
    branches: [main]
  # No `branches:` filter on pull_request — stacked PRs (base != main)
  # must trigger helm-test too. A missing filter matches any base.
  pull_request:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: helm-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  helm-test:
    name: helm-test (${{ matrix.chart }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        chart: [cullis, cullis-mastio]

    steps:
      - uses: actions/checkout@v4

      - name: Detect Helm chart changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            helm:
              - 'deploy/helm/**'
              - '.github/workflows/helm-test.yml'

      - name: Skip (no Helm chart changes)
        if: steps.filter.outputs.helm != 'true'
        run: |
          echo "No files under deploy/helm/ changed in this PR."
          echo "helm-test check reports success without spinning up kind."

      - name: Install Helm
        if: steps.filter.outputs.helm == 'true'
        # Pinned to SHA (was @v4 floating major) — audit 2026-04-30 lane 8 M5.
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4  # v4.3.1
        with:
          version: v3.16.2

      - name: Helm lint
        if: steps.filter.outputs.helm == 'true'
        run: helm lint deploy/helm/${{ matrix.chart }}/

      - name: Helm template (default values)
        if: steps.filter.outputs.helm == 'true'
        run: helm template ${{ matrix.chart }} deploy/helm/${{ matrix.chart }}/ > /tmp/template-default.yaml

      - name: Helm template (dev values)
        if: steps.filter.outputs.helm == 'true'
        run: |
          if [ -f deploy/helm/${{ matrix.chart }}/values-dev.yaml ]; then
            helm template ${{ matrix.chart }} deploy/helm/${{ matrix.chart }}/ \
              -f deploy/helm/${{ matrix.chart }}/values-dev.yaml \
              > /tmp/template-dev.yaml
          else
            echo "No values-dev.yaml for ${{ matrix.chart }}, skipping dev template."
          fi

      - name: Create kind cluster
        if: steps.filter.outputs.helm == 'true'
        uses: helm/kind-action@v1
        with:
          version: v0.26.0
          node_image: kindest/node:v1.31.4

      # Build the chart's application image from source and load it into
      # the kind node. values.yaml defaults point at ghcr.io/... images
      # that the repo does not publish yet (the release workflow for
      # community images is tracked in opencore_roadmap Fase 1.x). Until
      # those images are pushed, helm-test builds them locally so the
      # chart can still be exercised end-to-end on every PR.
      - name: Build ${{ matrix.chart }} image
        if: steps.filter.outputs.helm == 'true'
        run: |
          if [ "${{ matrix.chart }}" = "cullis" ]; then
            docker build -t cullis-broker:ci-local -f Dockerfile .
          else
            docker build -t cullis-mastio:ci-local -f mcp_proxy/Dockerfile .
          fi

      - name: Load image into kind
        if: steps.filter.outputs.helm == 'true'
        run: |
          if [ "${{ matrix.chart }}" = "cullis" ]; then
            kind load docker-image cullis-broker:ci-local --name chart-testing
          else
            kind load docker-image cullis-mastio:ci-local --name chart-testing
          fi

      # values-dev.yaml has broker.pki.bootstrap.enabled=true, so the
      # chart auto-provisions the broker CA (pre-install Job) and seeds
      # Vault (post-install Job) without any manual kubectl exec.
      #
      # image.pullPolicy=Never forces the kubelet to use the image we
      # just kind-loaded instead of trying to pull from a registry that
      # does not have it.
      - name: Helm install ${{ matrix.chart }}
        if: steps.filter.outputs.helm == 'true'
        run: |
          kubectl create namespace cullis-test --dry-run=client -o yaml | kubectl apply -f -
          if [ "${{ matrix.chart }}" = "cullis" ]; then
            helm install ${{ matrix.chart }} deploy/helm/${{ matrix.chart }}/ \
              -n cullis-test \
              -f deploy/helm/${{ matrix.chart }}/values-dev.yaml \
              --set broker.image.repository=cullis-broker \
              --set broker.image.tag=ci-local \
              --set broker.image.pullPolicy=Never \
              --wait --timeout 8m
          else
            # ADR-014 — the helm-test job validates chart deployment, not
            # the nginx sidecar end-to-end. The sidecar is exercised in
            # docker-compose dogfood (verde 9/9 in PR-A); its K8s pod
            # life-cycle has a separate failure mode (lifespan stalls
            # post-cert-mint, suspected fsGroup × emptyDir interaction)
            # that wants its own kind-local debug session. Until that
            # lands as a follow-up, helm-test runs cullis-mastio with
            # ``nginx.enabled=false`` so the chart installs the proxy
            # alone and serves /healthz on 9100. Standalone is left
            # at the chart default (true).
            helm install ${{ matrix.chart }} deploy/helm/${{ matrix.chart }}/ \
              -n cullis-test \
              -f deploy/helm/${{ matrix.chart }}/values-dev.yaml \
              --set proxy.image.repository=cullis-mastio \
              --set proxy.image.tag=ci-local \
              --set proxy.image.pullPolicy=Never \
              --set nginx.enabled=false \
              --wait --timeout 5m
          fi

      # ADR-014 — for cullis-mastio the Service hands raw TLS bytes from
      # the in-pod nginx sidecar on 9443. We curl over HTTPS with -sk
      # because the leaf is signed by the Mastio's auto-generated Org CA
      # (we're testing "the chart serves healthz", not TLS validation).
      - name: Assert /healthz 200
        if: steps.filter.outputs.helm == 'true'
        run: |
          if [ "${{ matrix.chart }}" = "cullis" ]; then
            SVC=cullis-broker PORT=8000 SCHEME=http CURL_FLAGS="-sf"
          else
            # nginx.enabled=false in helm-test → service exposes 9100 plain.
            SVC=cullis-mastio PORT=9100 SCHEME=http CURL_FLAGS="-sf"
          fi
          kubectl -n cullis-test run curl-healthz --rm -i --restart=Never \
            --image=curlimages/curl:8.10.1 -- \
            curl $CURL_FLAGS --max-time 10 $SCHEME://$SVC:$PORT/healthz

      - name: Assert /readyz 200
        if: steps.filter.outputs.helm == 'true'
        run: |
          if [ "${{ matrix.chart }}" = "cullis" ]; then
            SVC=cullis-broker PORT=8000 SCHEME=http CURL_FLAGS="-sf"
          else
            SVC=cullis-mastio PORT=9100 SCHEME=http CURL_FLAGS="-sf"
          fi
          kubectl -n cullis-test run curl-readyz --rm -i --restart=Never \
            --image=curlimages/curl:8.10.1 -- \
            curl $CURL_FLAGS --max-time 10 $SCHEME://$SVC:$PORT/readyz

      - name: Dump /readyz body on failure
        if: failure() && steps.filter.outputs.helm == 'true'
        run: |
          if [ "${{ matrix.chart }}" = "cullis" ]; then
            SVC=cullis-broker PORT=8000 SCHEME=http CURL_FLAGS="-s"
          else
            SVC=cullis-mastio PORT=9100 SCHEME=http CURL_FLAGS="-s"
          fi
          echo "::group::/readyz body"
          kubectl -n cullis-test run curl-readyz-dump --rm -i --restart=Never \
            --image=curlimages/curl:8.10.1 -- \
            curl $CURL_FLAGS --max-time 10 "$SCHEME://$SVC:$PORT/readyz" || true
          echo ""
          echo "::endgroup::"

      - name: Dump logs on failure
        if: failure() && steps.filter.outputs.helm == 'true'
        run: |
          echo "::group::pods"
          kubectl -n cullis-test get pods -o wide || true
          echo "::endgroup::"
          echo "::group::events"
          kubectl -n cullis-test get events --sort-by='.lastTimestamp' || true
          echo "::endgroup::"
          for pod in $(kubectl -n cullis-test get pods -o name); do
            echo "::group::$pod (current)"
            kubectl -n cullis-test logs "$pod" --tail=500 || true
            echo "::endgroup::"
            echo "::group::$pod (previous)"
            kubectl -n cullis-test logs "$pod" --tail=500 --previous || true
            echo "::endgroup::"
            echo "::group::$pod (describe)"
            kubectl -n cullis-test describe "$pod" || true
            echo "::endgroup::"
          done
