name: smoke

# End-to-end pre-merge gate. If this job fails, the golden path is broken
# and the PR must not merge. See demo_network/README.md for what exactly
# is covered.
#
# Runs on EVERY PR so the required status check always reports. When no
# behavioral code changed (docs-only, helm-only, sdk-ts-only, etc.) the
# job skips the heavy work and reports success. The filter below decides
# what counts as "behavioral code".

on:
  push:
    branches: [main]
  # No `branches:` filter on pull_request — stacked PRs (base != main)
  # must trigger the smoke gate too. A missing filter matches any base.
  pull_request:

permissions:
  contents: read
  pull-requests: read

concurrency:
  # Cancel superseded runs on the same branch / PR so a rebase doesn't
  # leave an orphan job burning CI minutes.
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    # Default PKI_KEY_TYPE=rsa (matrix entry "rsa") is the canonical golden
    # path. The "ec" entry boots the same stack with broker CA, org CAs and
    # agent certs all ECDSA-P256 — proves the all-ECC claim on every PR
    # touching crypto-adjacent code.
    # Job name format kept stable for the branch-protection required-check
    # contract:
    #   - "demo_network smoke (rsa)"           — golden path, sqlite (REQUIRED)
    #   - "demo_network smoke (ec)"            — all-ECC, sqlite (REQUIRED)
    #   - "demo_network smoke (rsa, postgres)" — ADR-001 Phase 1.4, additive
    name: ${{ matrix.name }}
    runs-on: [self-hosted, linux, x64, cullis-vm]
    timeout-minutes: 20
    # Skip on fork PR (self-hosted runner is on Cullis dev infra, fork
    # code must not run there). Fork PRs validate via local smoke.sh.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "demo_network smoke (rsa)"
            key_type: rsa
            proxy_db: sqlite
            script: "./smoke.sh full"
          - name: "demo_network smoke (ec)"
            key_type: ec
            proxy_db: sqlite
            script: "./smoke.sh full"
          - name: "demo_network smoke (rsa, postgres)"
            key_type: rsa
            proxy_db: postgres
            script: "./smoke.sh full"
          # ADR-006 Fase 1 / PR #4 — Trojan Horse acceptance gate.
          # Zero broker, just the proxy container + two seeded agents
          # exercising the full intra-org lifecycle end-to-end.
          - name: "standalone smoke"
            key_type: rsa
            proxy_db: sqlite
            script: "./standalone_smoke.sh full"

    steps:
      - uses: actions/checkout@v4

      - name: Detect behavioral code changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'app/**'
              - 'mcp_proxy/**'
              - 'cullis_sdk/**'
              - 'alembic/**'
              - 'demo_network/**'
              - 'requirements.txt'
              - 'Dockerfile'
              - '.github/workflows/smoke.yml'

      - name: Skip (no behavioral code changed)
        if: steps.filter.outputs.code != 'true'
        run: |
          echo "No files in behavioral code paths changed in this PR."
          echo "Smoke check reports success without running the full stack."

      - name: Docker + Compose version
        if: steps.filter.outputs.code == 'true'
        run: |
          docker --version
          docker compose version

      - name: Enable BuildKit cache
        if: steps.filter.outputs.code == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Run smoke
        if: steps.filter.outputs.code == 'true'
        working-directory: demo_network
        env:
          PKI_KEY_TYPE: ${{ matrix.key_type }}
          PROXY_DB: ${{ matrix.proxy_db }}
          # Pin a unique docker compose project name per matrix entry
          # + run id. Self-hosted runner has 3 agents that may execute
          # smoke matrix entries in parallel on the SAME docker daemon,
          # which races on container names, network names, and the
          # Postgres state in compose.postgres.yml (PR #779 surfaced
          # duplicate-key violations on ``ix_federation_events_org_seq``
          # when rsa+ec+postgres entries ran simultaneously). The
          # run id keeps successive CI runs isolated too.
          COMPOSE_PROJECT_NAME: cullis-smoke-${{ matrix.key_type }}-${{ matrix.proxy_db }}-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          ${{ matrix.script }}
        # smoke.sh already dumps the last 100 lines of each critical
        # service on failure, so no separate post-step log collection
        # is needed.

      - name: Collect logs on failure
        if: failure() && steps.filter.outputs.code == 'true'
        working-directory: demo_network
        run: |
          echo "::group::docker compose ps"
          docker compose ps -a || true
          echo "::endgroup::"
          for svc in ca-init broker-init broker bootstrap proxy-a-init proxy-a proxy-b-init proxy-b sender checker traefik prober; do
            echo "::group::$svc"
            docker compose logs "$svc" 2>&1 || true
            echo "::endgroup::"
          done

      - name: Teardown (defensive)
        if: always() && steps.filter.outputs.code == 'true'
        working-directory: demo_network
        run: |
          ./smoke.sh down || true
          ./standalone_smoke.sh down || true
