# Release pipeline for the Cullis Mastio.
#
# Triggered by pushing a tag of the form `mastio-vX.Y.Z`. On tag push:
#
#   1. Run the proxy test subset to gate the release.
#   2. Build and push the multi-arch Docker image to ghcr.io.
#   3. Package + push the Helm chart to ghcr.io.
#   4. Build the deploy bundle (tar.gz + zip) from packaging/mastio-bundle/.
#   5. Create a GitHub Release with bundle assets + image refs.
#
# The Mastio is a runtime, not a library — no PyPI upload.

name: release-mastio

on:
  push:
    tags:
      - "mastio-v*"

permissions:
  contents: read

jobs:
  # ── 1. Tests ─────────────────────────────────────────────────────────
  test:
    name: Test Mastio
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Mastio test subset
        env:
          OTEL_ENABLED: "false"
          DATABASE_URL: "sqlite+aiosqlite://"
        run: |
          pytest \
            tests/test_proxy_reverse_forwarding.py \
            tests/test_proxy_sign_assertion.py \
            tests/test_proxy_resolve.py \
            tests/test_proxy_routing.py \
            tests/test_proxy_local_sessions.py \
            tests/test_proxy_local_messages.py \
            tests/test_proxy_local_sweeper.py \
            tests/test_proxy_local_ws.py \
            tests/test_proxy_mtls_only_send.py \
            tests/test_proxy_migrations.py \
            tests/test_proxy_dashboard_oidc.py \
            tests/test_proxy_federation_sync.py \
            tests/test_enrollment.py \
            --tb=short

  # ── 2. Extract version ───────────────────────────────────────────────
  version:
    name: Extract version
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract version from tag
        id: extract
        run: |
          # mastio-v1.2.3 → 1.2.3
          version="${GITHUB_REF_NAME#mastio-v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Releasing cullis-mastio: ${version}"

  # ── 3. Docker image → ghcr.io ───────────────────────────────────────
  build-docker:
    name: Build & push Docker image
    needs: [test, version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cullis-mastio
          tags: |
            type=match,pattern=mastio-v(.*),group=1
            type=match,pattern=mastio-v(\d+\.\d+)\..*,group=1
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-alpha') && !contains(github.ref_name, '-beta') }}
          labels: |
            org.opencontainers.image.title=Cullis Mastio
            org.opencontainers.image.description=Standalone org-level gateway for AI agents
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.version.outputs.version }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: mcp_proxy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Helm chart → ghcr.io/<owner>/charts/cullis-mastio ─────────────
  publish-helm:
    name: Package & push Helm chart
    needs: [build-docker, version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: "v3.14.4"

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io \
              --username "${{ github.actor }}" \
              --password-stdin

      - name: Override chart + app version from tag
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          # The tag is the source of truth; Chart.yaml's baked-in version
          # is the floor for local development. Bump both in lockstep here
          # so `helm install ... --version X.Y.Z` always matches the image.
          sed -i "s/^version: .*/version: ${VERSION}/" deploy/helm/cullis-mastio/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"${VERSION}\"/" deploy/helm/cullis-mastio/Chart.yaml
          head -15 deploy/helm/cullis-mastio/Chart.yaml

      - name: Package chart
        run: |
          mkdir -p dist/charts
          helm package deploy/helm/cullis-mastio --destination dist/charts
          ls -lah dist/charts

      - name: Push chart to OCI registry
        env:
          VERSION: ${{ needs.version.outputs.version }}
          OWNER: ${{ github.repository_owner }}
        run: |
          helm push \
            "dist/charts/cullis-mastio-${VERSION}.tgz" \
            "oci://ghcr.io/${OWNER}/charts"

  # ── 5. Deploy bundle (tar.gz + zip) ─────────────────────────────────
  build-bundle:
    name: Build deploy bundle
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stamp version into bundle
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          # Pin CULLIS_MASTIO_VERSION default to the released version so
          # `./deploy.sh` (no env var) gets a reproducible image instead
          # of `latest`. Operators can still override the env var.
          sed -i "s|CULLIS_MASTIO_VERSION:-latest|CULLIS_MASTIO_VERSION:-${VERSION}|" \
            packaging/mastio-bundle/docker-compose.yml

      - name: Stage bundle
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          STAGING="dist/cullis-mastio-bundle-${VERSION}"
          mkdir -p "${STAGING}"
          cp -r packaging/mastio-bundle/. "${STAGING}/"
          ls -lah "${STAGING}/"
          # Stable-name top-level dir inside the archive: `cullis-mastio-bundle/`
          # (no version suffix) so the README quickstart `cd cullis-mastio-bundle/`
          # works against any release. The archive filename carries the version.
          mv "${STAGING}" "dist/cullis-mastio-bundle"

      - name: Package tar.gz + zip
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          cd dist
          tar czf "cullis-mastio-bundle-${VERSION}.tar.gz" cullis-mastio-bundle
          tar czf "cullis-mastio-bundle.tar.gz" cullis-mastio-bundle
          zip -qr "cullis-mastio-bundle-${VERSION}.zip" cullis-mastio-bundle
          zip -qr "cullis-mastio-bundle.zip" cullis-mastio-bundle
          ls -lah *.tar.gz *.zip

      - uses: actions/upload-artifact@v4
        with:
          name: bundle
          path: |
            dist/cullis-mastio-bundle-*.tar.gz
            dist/cullis-mastio-bundle-*.zip
            dist/cullis-mastio-bundle.tar.gz
            dist/cullis-mastio-bundle.zip
          retention-days: 7

  # ── 6. GitHub Release ────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-docker, publish-helm, build-bundle, version]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: bundle
          path: dist

      - name: Extract changelog section
        id: changelog
        run: |
          version="${{ needs.version.outputs.version }}"
          if [[ -f CHANGELOG.md ]]; then
            awk "/^## \\[?v?${version}\\]?/{flag=1; next} /^## /{flag=0} flag" CHANGELOG.md \
              > release-notes.md || true
          fi
          if [[ ! -s release-notes.md ]]; then
            cat > release-notes.md <<NOTES
          Release ${GITHUB_REF_NAME}

          ## Quickstart

          \`\`\`bash
          curl -L https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/cullis-mastio-bundle.tar.gz | tar xz
          cd cullis-mastio-bundle/
          ./deploy.sh
          \`\`\`

          Reaches \`https://localhost:9443/proxy/login\` with a self-
          signed cert from the auto-generated Org CA. Complete the
          first-boot wizard and enroll your first agent.

          ## Artifacts

          - **Bundle**: \`cullis-mastio-bundle-${version}.tar.gz\` /
            \`.zip\` (image-based docker-compose, no source tree
            required)
          - **Docker image**: \`ghcr.io/${{ github.repository_owner }}/cullis-mastio:${version}\`
          - **Helm chart**: \`oci://ghcr.io/${{ github.repository_owner }}/charts/cullis-mastio:${version}\`

          ## Kubernetes

          \`\`\`bash
          helm install cullis-mastio \\
            oci://ghcr.io/${{ github.repository_owner }}/charts/cullis-mastio \\
            --version ${version} \\
            --set nginx.san="mastio.myorg.example.com,mastio.local" \\
            --set proxy.proxyPublicUrl=https://mastio.myorg.example.com
          \`\`\`

          The chart deploys the nginx sidecar in the same pod and
          exposes port 9443 via the Service. \`org_id\` is derived
          from the auto-generated Org CA (ADR-006 §2.2) — no extra
          \`--set\` needed unless you bring your own CA.
          NOTES
          fi
          cat release-notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Cullis Mastio ${{ github.ref_name }}"
          body_path: release-notes.md
          files: |
            dist/cullis-mastio-bundle-*.tar.gz
            dist/cullis-mastio-bundle-*.zip
            dist/cullis-mastio-bundle.tar.gz
            dist/cullis-mastio-bundle.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
