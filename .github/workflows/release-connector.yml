# Release pipeline for `cullis-connector`.
#
# Triggered by pushing a tag of the form `connector-vX.Y.Z`. On tag push:
#
#   1. Run the connector test subset to gate the release.
#   2. Build a standalone PyPI wheel + sdist from packaging/pypi/.
#   3. Build and push the Docker image to ghcr.io (multi-arch).
#   4. Build PyInstaller binaries for Linux and macOS (best effort).
#   5. Create a GitHub Release and attach wheel, sdist, and binaries.
#   6. Optionally publish to PyPI (gated on PYPI_TOKEN presence).
#
# This workflow is intentionally isolated from the main CI pipeline: it
# must not run on PRs or pushes to main. Only tag pushes trigger it.

name: release-connector

on:
  push:
    tags:
      - "connector-v*"
  # Manual retrigger escape hatch: `gh workflow run release-connector.yml --ref connector-vX.Y.Z`.
  # Useful when GHA dedupes a tag-push trigger (we hit this on connector-v0.3.1)
  # or when re-running a release on the same SHA without a force-push.
  workflow_dispatch:

# Minimal default permissions; individual jobs grant what they need.
permissions:
  contents: read

jobs:
  # ── 1. Tests ─────────────────────────────────────────────────────────
  test:
    name: Test connector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run connector tests
        env:
          OTEL_ENABLED: "false"
          DATABASE_URL: "sqlite+aiosqlite://"
        run: pytest tests/connector tests/test_enrollment.py --tb=short

  # ── 2. Build wheel + sdist (standalone PyPI distribution) ───────────
  build-python:
    name: Build Python distributions
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Extract version from tag
        id: extract-version
        run: |
          # connector-v1.2.3 → 1.2.3
          version="${GITHUB_REF_NAME#connector-v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Releasing version: ${version}"

      - name: Verify pyproject + __init__ versions match tag
        run: |
          tag_version="${GITHUB_REF_NAME#connector-v}"
          pyproject_version=$(grep -E '^version = ' packaging/pypi/pyproject.toml | head -1 | cut -d'"' -f2)
          init_version=$(grep -E '^__version__' cullis_connector/__init__.py | head -1 | cut -d'"' -f2)
          fail=0
          if [ "$tag_version" != "$pyproject_version" ]; then
            echo "ERROR: tag version ($tag_version) != packaging/pypi/pyproject.toml version ($pyproject_version)"
            fail=1
          fi
          if [ "$tag_version" != "$init_version" ]; then
            echo "ERROR: tag version ($tag_version) != cullis_connector/__init__.py __version__ ($init_version)"
            fail=1
          fi
          if [ "$fail" = "1" ]; then
            echo "Bump both files to match the tag before pushing the tag."
            exit 1
          fi
          echo "OK: versions aligned at $tag_version"

      - name: Install build tool
        run: python -m pip install --upgrade pip build

      - name: Build wheel + sdist
        # Uses the staging helper so README_PKG.md, LICENSE, NOTICE, and
        # the connector source tree are copied into packaging/pypi/ before
        # hatchling runs — the raw `python -m build packaging/pypi/`
        # invocation skips staging and fails on the missing README_PKG.md.
        run: bash packaging/pypi/build.sh

      - name: Smoke test wheel
        # Yesterday (connector-v0.3.1) this step was just `pip install
        # <wheel> && cullis-connector --version`. It passed even though
        # the wheel ImportError'd at runtime: `--version` only reads
        # `__version__` and never touches `cullis_sdk` or any extras
        # dep. End-user `pipx install cullis-connector` then died on
        # `ModuleNotFoundError: cullis_sdk` because `cullis-sdk` wasn't
        # declared and (worse) wasn't even on PyPI.
        #
        # The new smoke installs WITH the extras a real user would
        # request, runs `import cullis_connector` from a directory that
        # does NOT contain the source tree (so the import resolves from
        # site-packages, not the repo checkout), and explicitly imports
        # each extras-only module. Anything missing from `dependencies`
        # or from an `optional-dependencies` group blows up here, before
        # publish.
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install "$(ls dist/cullis_connector-*.whl)[dashboard,desktop]"
          cd /tmp
          /tmp/smoke/bin/python -c "import cullis_connector; print('cullis-connector', cullis_connector.__version__); assert '/site-packages/' in cullis_connector.__file__, cullis_connector.__file__"
          /tmp/smoke/bin/python -c "from cullis_connector.cli import main; print('cli main importable')"
          /tmp/smoke/bin/python -c "import cullis_sdk; assert '/site-packages/' in cullis_sdk.__file__, cullis_sdk.__file__; print('cullis-sdk dep resolved:', cullis_sdk.__version__)"
          /tmp/smoke/bin/python -c "import fastapi, uvicorn, jinja2, plyer; print('dashboard extras present')"
          # `[desktop]` extras are GUI libraries: pystray probes X11 at
          # import time (Xlib.display.Display()), pywebview initialises
          # GTK at import time on Linux. On a headless GHA runner with
          # no DISPLAY, both crash before the smoke can verify they are
          # actually installed. We check via importlib.metadata instead
          # — same coverage against the "extras dep missing from
          # pyproject" failure mode (PackageNotFoundError if pip never
          # installed it), no GUI initialisation. The ZIP/PyInstaller
          # bundles run on real user desktops where GUI init works.
          /tmp/smoke/bin/python -c "
          import importlib.metadata as m
          for pkg in ['pystray', 'pywebview', 'Pillow']:
              v = m.version(pkg)
              print(f'  {pkg} {v}')
          print('desktop extras present')
          "
          /tmp/smoke/bin/cullis-connector --version

      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
          retention-days: 7

  # ── 3. Docker image → ghcr.io ───────────────────────────────────────
  build-docker:
    name: Build & push Docker image
    needs: [test, build-python]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cullis-connector
          tags: |
            type=match,pattern=connector-v(.*),group=1
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packaging/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. PyInstaller binaries (best effort, per-OS) ────────────────────
  build-binaries:
    name: Build binary (${{ matrix.os }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build binary
        shell: bash  # works on windows-latest (Git Bash)
        run: bash packaging/pyinstaller/build.sh

      - name: Package zip with installer
        shell: bash
        run: |
          set -euo pipefail
          STAGING="dist/stage-${{ matrix.platform }}"
          mkdir -p "${STAGING}"

          # Binary (PyInstaller stamped the platform+arch in the name).
          cp dist/cullis-connector-* "${STAGING}/"

          # Installer script for this OS + the shared README.
          cp packaging/installers/README.txt "${STAGING}/"
          case "${{ matrix.platform }}" in
            macos)   cp packaging/installers/install.command "${STAGING}/" ;;
            linux)   cp packaging/installers/install.sh "${STAGING}/" ;;
            windows) cp packaging/installers/install.bat "${STAGING}/" ;;
          esac

          # Stable-name zip: `cullis-connector-${platform}.zip`. The
          # download page in the proxy links to
          # releases/latest/download/<this-name> and GitHub handles the
          # redirect, so admins sharing the link never have to update it
          # after a new tag.
          #
          # We zip via Python's shutil.make_archive instead of the `zip`
          # CLI because windows-latest runners don't ship `zip` by default
          # (only 7z and Compress-Archive), and Python is already on PATH
          # here from the setup-python step.
          ZIP_BASE="dist/cullis-connector-${{ matrix.platform }}"
          python -c "import shutil; shutil.make_archive('${ZIP_BASE}', 'zip', '${STAGING}')"
          ls -lah "${ZIP_BASE}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform }}
          path: |
            dist/cullis-connector-*
            dist/cullis-connector-${{ matrix.platform }}.zip
          retention-days: 7

  # ── 5. GitHub Release ────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-python, build-docker, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten artifacts
        run: |
          mkdir -p dist
          find release-assets -type f \( -name 'cullis_connector-*' -o -name 'cullis-connector-*' \) \
            -exec cp -v {} dist/ \;
          ls -lah dist/

      - name: Extract changelog section
        id: changelog
        run: |
          version="${GITHUB_REF_NAME#connector-v}"
          # Grab the section matching ## [vX.Y.Z] or ## vX.Y.Z up to the next ## heading.
          awk "/^## \\[?v?${version}\\]?/{flag=1; next} /^## /{flag=0} flag" CHANGELOG.md \
            > release-notes.md || true
          if [[ ! -s release-notes.md ]]; then
            echo "Release ${GITHUB_REF_NAME}" > release-notes.md
          fi
          cat release-notes.md

      - name: Create release
        # Pinned to SHA (was @v2 floating major) — audit 2026-04-30 lane 8 M5.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.6.2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Cullis Connector ${{ github.ref_name }}"
          body_path: release-notes.md
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}

  # ── 6. PyPI upload ──────────────────────────────────────────────────
  #
  # PyPI trusted publishing (OIDC). The PyPI project `cullis-connector`
  # is configured with this repo + workflow as a trusted publisher, so
  # the action mints a short-lived OIDC token at runtime instead of
  # using a long-lived PYPI_TOKEN. `id-token: write` and the `pypi`
  # environment together unlock the OIDC exchange.
  publish-pypi:
    name: Publish to PyPI
    needs: build-python
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/cullis-connector
    permissions:
      id-token: write  # required for PyPI trusted publishing OIDC exchange
    steps:
      - name: Download wheel + sdist
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        # Pinned to SHA (was @release/v1 moving alias) — audit 2026-04-30
        # lane 8 M3. Most-exposed step in the entire release flow.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
