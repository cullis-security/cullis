name: cullis-chat

on:
  push:
    branches: [main]
    paths:
      - 'frontend/cullis-chat/**'
      - '.github/workflows/cullis-chat.yml'
  pull_request:
    paths:
      - 'frontend/cullis-chat/**'
      - '.github/workflows/cullis-chat.yml'

concurrency:
  group: cullis-chat-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: frontend/cullis-chat

jobs:
  build-and-e2e:
    runs-on: [self-hosted, linux, x64, cullis-vm]
    timeout-minutes: 15
    # Skip on fork PR: self-hosted runner is on Cullis dev infra.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/cullis-chat/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run e2e suite
        run: npm run test:e2e
        env:
          CI: 'true'

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/cullis-chat/playwright-report/
          retention-days: 7
