name: CI

on:
  push:
    branches: [main]
  # No `branches:` filter on pull_request — stacked PRs (base != main)
  # must trigger CI too. A missing filter matches any base branch.
  pull_request:

# Require approval before running CI on PRs from forks.
# This prevents untrusted code from executing pip install.
permissions:
  contents: read

jobs:
  # ─── Path filter ────────────────────────────────────────────────────
  # Detects whether the PR touches code paths that the unit suite + lint
  # actually cover. Docs / sandbox / reference / packaging changes don't
  # need the 1981-test pytest run — the umbrella ``test (3.11)`` job
  # below short-circuits to a green pass when ``code`` is false, so
  # branch protection still gets the required check.
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'app/**'
              - 'mcp_proxy/**'
              - 'cullis_sdk/**'
              - 'cullis_connector/**'
              - 'agents/**'
              - 'tests/**'
              - 'sdk-ts/**'
              - 'alembic/**'
              - 'requirements*.txt'
              - 'pyproject.toml'
              - 'pytest.ini'
              - '.github/workflows/ci.yml'

  # ─── Test shards (3-way pytest-split) ───────────────────────────────
  # Splits the ~1981-test suite across 3 parallel runners. Each shard
  # repeats setup (pip + npm cache hits keep it cheap) and runs roughly
  # one third of the tests by file. ``--dist=loadfile`` from pytest.ini
  # still applies inside each shard for intra-runner xdist parallelism.
  #
  # Not a required check — the umbrella ``test (3.11)`` job below
  # aggregates the three results so branch protection keeps a single
  # check name.
  test-shard:
    name: test-shard (${{ matrix.split-group }}/3)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        split-group: [1, 2, 3]
    env:
      ADMIN_SECRET: "test-secret-not-default"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: sdk-ts/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest-repeat

      - name: Build TypeScript SDK (for cross-language interop test)
        working-directory: sdk-ts
        run: |
          npm ci
          npx tsc || true  # pre-existing unused-var warning in client.ts doesn't block emit

      - name: Lint with ruff
        if: matrix.split-group == 1
        run: |
          ruff check app/ agents/sdk.py tests/ --select E,F,W --ignore E501,E402

      - name: Verify Alembic migrations
        if: matrix.split-group == 1
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./test_migrations.db"
        run: |
          alembic upgrade head
          python -c "import sqlite3; c=sqlite3.connect('test_migrations.db'); tables=c.execute(\"SELECT name FROM sqlite_master WHERE type='table'\").fetchall(); print(f'{len(tables)} tables created'); assert len(tables) >= 10, f'Expected >=10 tables, got {len(tables)}'"
          rm -f test_migrations.db

      - name: Run tests (shard ${{ matrix.split-group }}/3)
        env:
          OTEL_ENABLED: "false"
          DATABASE_URL: "sqlite+aiosqlite://"
        run: |
          pytest tests/ \
              --tb=short \
              --ignore=tests/test_postgres_integration.py \
              --splits 3 --group ${{ matrix.split-group }}

      - name: Anti-flaky concurrency gate (10× rotation race tests)
        if: matrix.split-group == 1
        env:
          OTEL_ENABLED: "false"
          DATABASE_URL: "sqlite+aiosqlite://"
        # Issue #281 — pinned to shard 1 instead of every shard so the
        # 100s overhead is paid once. The full file is ~10s per run, so
        # 10× ≈ 100s is acceptable CI cost for the blast-radius of this
        # code path.
        run: |
          pytest tests/test_proxy_mastio_rotation_concurrency.py \
              --count=10 -n auto --dist=loadfile --tb=short -q

  # ─── Umbrella job — preserves the ``test (3.11)`` required check ────
  # Aggregates the test-shard matrix into a single status check named
  # ``test (3.11)`` so the existing branch protection rule keeps
  # working without rule edits. Passes when:
  #   - ``code`` filter is false (no relevant changes), OR
  #   - all three shards succeeded.
  test:
    needs: [changes, test-shard]
    if: always()
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - name: Aggregate shard results
        run: |
          set -e
          code="${{ needs.changes.outputs.code }}"
          shard="${{ needs.test-shard.result }}"
          echo "code=${code} shard=${shard}"
          if [[ "${code}" != "true" ]]; then
            echo "No code changes — skipping test suite (umbrella PASS)."
            exit 0
          fi
          if [[ "${shard}" == "success" ]]; then
            echo "All shards green."
            exit 0
          fi
          echo "::error::test-shard matrix did not succeed (result=${shard})"
          exit 1

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Audit dependencies
        # ``pip-audit`` without args scans the whole virtualenv, which includes
        # build-toolchain packages (pip, setuptools, wheel) that ship nothing
        # to customers. Scoping to requirements.txt audits exactly what the
        # broker image runs — anything we actually deploy. Newly-disclosed
        # CVEs against pip itself still get picked up upstream; we don't want
        # them to block deploys of code that doesn't include pip.
        run: |
          pip install -r requirements.txt
          pip-audit -r requirements.txt

      - name: Ban insecure TLS opt-outs in production code
        # Matches audit F-E-01/F-E-02 class: blanket `verify=False` or
        # `rejectUnauthorized: false` buried in runtime code is how the
        # EUDI wallet shipped a MITM-wide-open URLSession. Keep the
        # guard so new code can't regress.
        #
        # Allow-list: tests/, sandbox/ (dev-only), demo/,
        # demo_network/ use self-signed fixtures deliberately. Any
        # production surface (app/, mcp_proxy/, cullis_sdk/,
        # cullis_connector/, agents/, sdk-ts/src/) must use the wired
        # verify_tls flag.
        run: |
          set -e
          # Regex intent: assignment only. Must NOT match the substrings
          # inside docstrings/comments/error messages that legitimately
          # *reference* the anti-pattern while explaining the fix.
          py_hits=$(grep -rn --include='*.py' \
            -E 'verify\s*=\s*False[\s,)]' \
            app/ mcp_proxy/ cullis_sdk/ cullis_connector/ agents/ \
            | grep -vE '^[^:]+:[0-9]+:\s*#' \
            || true)
          ts_hits=$(grep -rn --include='*.ts' --include='*.tsx' \
            -E 'rejectUnauthorized\s*:\s*false|process\.env\.NODE_TLS_REJECT_UNAUTHORIZED\s*=' \
            sdk-ts/src/ cullis_connector/ \
            | grep -vE '^[^:]+:[0-9]+:\s*//' \
            || true)
          if [ -n "$py_hits" ] || [ -n "$ts_hits" ]; then
            echo "::error::Insecure TLS opt-out detected in production code."
            echo "$py_hits"
            echo "$ts_hits"
            echo ""
            echo "Fix: wire the call through the existing verify flag"
            echo "(e.g. ProxySettings.broker_verify_tls, CullisClient"
            echo "verify_tls), or move the code into tests/ if it is a"
            echo "test fixture. See imp/audit_2026_04_17/phase1_E_secrets.md"
            echo "F-E-01/F-E-02 for the audit reference."
            exit 1
          fi
