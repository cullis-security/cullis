name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Require approval before running CI on PRs from forks.
# This prevents untrusted code from executing pip install.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: sdk-ts/package-lock.json

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Build TypeScript SDK (for cross-language interop test)
        working-directory: sdk-ts
        run: |
          npm ci
          npx tsc || true  # pre-existing unused-var warning in client.ts doesn't block emit

      - name: Lint with ruff
        run: |
          ruff check app/ agents/sdk.py tests/ --select E,F,W --ignore E501,E402

      - name: Verify Alembic migrations
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./test_migrations.db"
        run: |
          alembic upgrade head
          python -c "import sqlite3; c=sqlite3.connect('test_migrations.db'); tables=c.execute(\"SELECT name FROM sqlite_master WHERE type='table'\").fetchall(); print(f'{len(tables)} tables created'); assert len(tables) >= 10, f'Expected >=10 tables, got {len(tables)}'"
          rm -f test_migrations.db

      - name: Run tests
        env:
          OTEL_ENABLED: "false"
          DATABASE_URL: "sqlite+aiosqlite://"
        run: |
          pytest tests/ -v --tb=short --ignore=tests/test_postgres_integration.py

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Audit dependencies
        run: |
          pip install -r requirements.txt
          pip-audit
