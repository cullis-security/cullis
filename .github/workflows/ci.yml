name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Require approval before running CI on PRs from forks.
# This prevents untrusted code from executing pip install.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    # Audit F-B-5: Settings() now refuses the insecure default
    # ADMIN_SECRET at construction time. Alembic imports app.db.database
    # (which calls get_settings() at module load) without going through
    # the pytest conftest.py that seeds a test secret, so set it
    # job-wide so every step that constructs Settings has a non-default
    # value available.
    #
    # The value MUST match the ``ADMIN_HEADERS`` literal hard-coded in
    # ``tests/conftest.py`` — the conftest uses ``os.environ.setdefault``
    # so a CI-supplied value wins, and ``ADMIN_HEADERS`` is a plain
    # string. Mismatch → every admin-authed test 403s against
    # ``/v1/admin/*`` and so on.
    env:
      ADMIN_SECRET: "test-secret-not-default"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: sdk-ts/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Build TypeScript SDK (for cross-language interop test)
        working-directory: sdk-ts
        run: |
          npm ci
          npx tsc || true  # pre-existing unused-var warning in client.ts doesn't block emit

      - name: Lint with ruff
        run: |
          ruff check app/ agents/sdk.py tests/ --select E,F,W --ignore E501,E402

      - name: Verify Alembic migrations
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./test_migrations.db"
        run: |
          alembic upgrade head
          python -c "import sqlite3; c=sqlite3.connect('test_migrations.db'); tables=c.execute(\"SELECT name FROM sqlite_master WHERE type='table'\").fetchall(); print(f'{len(tables)} tables created'); assert len(tables) >= 10, f'Expected >=10 tables, got {len(tables)}'"
          rm -f test_migrations.db

      - name: Run tests
        env:
          OTEL_ENABLED: "false"
          DATABASE_URL: "sqlite+aiosqlite://"
        run: |
          pytest tests/ --tb=short --ignore=tests/test_postgres_integration.py

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Audit dependencies
        run: |
          pip install -r requirements.txt
          pip-audit

      - name: Ban insecure TLS opt-outs in production code
        # Matches audit F-E-01/F-E-02 class: blanket `verify=False` or
        # `rejectUnauthorized: false` buried in runtime code is how the
        # EUDI wallet shipped a MITM-wide-open URLSession. Keep the
        # guard so new code can't regress.
        #
        # Allow-list: tests/, enterprise_sandbox/ (dev-only), demo/,
        # demo_network/ use self-signed fixtures deliberately. Any
        # production surface (app/, mcp_proxy/, cullis_sdk/,
        # cullis_connector/, agents/, sdk-ts/src/) must use the wired
        # verify_tls flag.
        run: |
          set -e
          # Regex intent: assignment only. Must NOT match the substrings
          # inside docstrings/comments/error messages that legitimately
          # *reference* the anti-pattern while explaining the fix.
          py_hits=$(grep -rn --include='*.py' \
            -E 'verify\s*=\s*False[\s,)]' \
            app/ mcp_proxy/ cullis_sdk/ cullis_connector/ agents/ \
            | grep -vE '^[^:]+:[0-9]+:\s*#' \
            || true)
          ts_hits=$(grep -rn --include='*.ts' --include='*.tsx' \
            -E 'rejectUnauthorized\s*:\s*false|process\.env\.NODE_TLS_REJECT_UNAUTHORIZED\s*=' \
            sdk-ts/src/ cullis_connector/ \
            | grep -vE '^[^:]+:[0-9]+:\s*//' \
            || true)
          if [ -n "$py_hits" ] || [ -n "$ts_hits" ]; then
            echo "::error::Insecure TLS opt-out detected in production code."
            echo "$py_hits"
            echo "$ts_hits"
            echo ""
            echo "Fix: wire the call through the existing verify flag"
            echo "(e.g. ProxySettings.broker_verify_tls, CullisClient"
            echo "verify_tls), or move the code into tests/ if it is a"
            echo "test fixture. See imp/audit_2026_04_17/phase1_E_secrets.md"
            echo "F-E-01/F-E-02 for the audit reference."
            exit 1
          fi
