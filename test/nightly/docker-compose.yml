# Nightly stress test — lean topology (no SPIRE, no Keycloak, no MCP servers).
#
# Services: Court + 2 Mastio (orga/orgb) + bootstrap. Agents run on the host
# as Python scripts driven by test/nightly/workload/*.py and connect via the
# published ports (8000/9100/9200).
#
# State persisted in ./state/ as a bind mount so host-side scripts can read
# the BYOCA-minted agent credentials.

networks:
  orga-internal:
    name: cullis-nightly-orga
    driver: bridge
  orgb-internal:
    name: cullis-nightly-orgb
    driver: bridge
  public-wan:
    name: cullis-nightly-wan
    driver: bridge

volumes:
  broker-ca:
  postgres-data:
  proxy-a-data:
  proxy-b-data:
  # ADR-014 — per-org nginx sidecar TLS material. Each Mastio writes
  # its server cert + Org CA bundle here at first-boot; the matching
  # mastio-nginx-{a,b} sidecar mounts read-only and serves 9443.
  mastio-a-nginx-certs:
  mastio-b-nginx-certs:

services:

  broker-ca-init:
    build: ../../sandbox/broker-ca-init
    environment:
      ORG_ID: broker
    volumes:
      - broker-ca:/broker-certs
    networks: [public-wan]
    restart: "no"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     atn
      POSTGRES_PASSWORD: atn-nightly
      POSTGRES_DB:       agent_trust
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [public-wan]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atn -d agent_trust"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    networks: [public-wan]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 20

  broker:
    build:
      context: ../..
      dockerfile: Dockerfile
    depends_on:
      broker-ca-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ADMIN_SECRET:            "${ADMIN_SECRET:-nightly-admin-secret-change-me}"
      KMS_BACKEND:             "local"
      BROKER_CA_KEY_PATH:      /broker-certs/broker-ca-key.pem
      BROKER_CA_CERT_PATH:     /broker-certs/broker-ca.pem
      DATABASE_URL:            "postgresql+asyncpg://atn:atn-nightly@postgres:5432/agent_trust"
      REDIS_URL:               "redis://redis:6379"
      POLICY_BACKEND:          "webhook"
      POLICY_ENFORCEMENT:      "true"
      POLICY_WEBHOOK_ALLOW_PRIVATE_IPS: "true"
      TRUST_DOMAIN:            "court.nightly"
      OTEL_ENABLED:            "false"
      ENVIRONMENT:             "development"
      FORWARDED_ALLOW_IPS:     "172.16.0.0/12"
    tmpfs:
      - /app/certs:uid=999,gid=999
    volumes:
      - broker-ca:/broker-certs:ro
    entrypoint: ["sh", "-c"]
    command:
      - |
        exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1 --proxy-headers --forwarded-allow-ips 172.16.0.0/12
    networks:
      public-wan:
        aliases: [broker]
    expose: ["8000"]
    ports: ["8000:8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  # ── Bootstrap: create orgs on Court + mint N agent certs ──────────────────

  bootstrap:
    build: ./bootstrap
    depends_on:
      broker:
        condition: service_healthy
    environment:
      BROKER_URL:       "http://broker:8000"
      ADMIN_SECRET:     "${ADMIN_SECRET:-nightly-admin-secret-change-me}"
      STATE_DIR:        /state
      AGENTS_PER_ORG:   "${AGENTS_PER_ORG:-10}"
      PKI_KEY_TYPE:     "${PKI_KEY_TYPE:-ec}"
    volumes:
      - ./state:/state
    networks: [public-wan]
    restart: "no"

  # ── Org A Mastio (proxy) ──────────────────────────────────────────────────

  proxy-a-init:
    build:
      context: ../..
      dockerfile: sandbox/proxy-init/Dockerfile
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    environment:
      ORG_ID:              "orga"
      BROKER_URL:          "http://broker:8000"
      PROXY_PUBLIC_URL:    "http://localhost:9100"
      PROXY_DB_PATH:       /data/mcp_proxy.db
      STATE_DIR:           /state
      # OIDC intentionally unset — local password auth for dashboard.
      SEED_MCP_RESOURCES:  "0"
    volumes:
      - ./state:/state:ro
      - proxy-a-data:/data
    networks: [orga-internal, public-wan]
    restart: "no"

  proxy-a:
    build:
      context: ../..
      dockerfile: mcp_proxy/Dockerfile
    depends_on:
      proxy-a-init:
        condition: service_completed_successfully
    environment:
      MCP_PROXY_STANDALONE: "false"  # PR-D: explicit federated opt-in
      MCP_PROXY_BROKER_URL:        "http://broker:8000"
      MCP_PROXY_BROKER_JWKS_URL:   "http://broker:8000/.well-known/jwks.json"
      MCP_PROXY_ADMIN_SECRET:      "${PROXY_A_ADMIN_SECRET:-nightly-proxy-admin-a}"
      MCP_PROXY_DATABASE_URL:      "sqlite+aiosqlite:////data/mcp_proxy.db"
      MCP_PROXY_ORG_ID:            "orga"
      MCP_PROXY_ALLOWED_ORIGINS:   "https://localhost:9443"
      MCP_PROXY_ENVIRONMENT:       "development"
      MCP_PROXY_FEDERATION_POLL_INTERVAL_S: "2"
      # ADR-014 — host-side smoke.py + workload drivers reach this Mastio
      # at https://localhost:9443 (mastio-nginx-a sidecar). Without this
      # env the backend reconstructs htu as http://localhost:9443/... (no
      # --proxy-headers) and DPoP htu match fails on every egress call.
      MCP_PROXY_PROXY_PUBLIC_URL:  "https://localhost:9443"
      PROXY_INTRA_ORG:             "true"
      PROXY_TRANSPORT_INTRA_ORG:   "mtls-only"
      MCP_PROXY_LOCAL_AUTH_ENABLED: "true"
      # ADR-013 layer 2 — expose the global rate-limit knobs so tests
      # can override them via shell env
      # (MCP_PROXY_GLOBAL_RATE_LIMIT_RPS=5 docker compose up ...) and
      # the shed path can be exercised without touching code. Defaults
      # match the Settings defaults in mcp_proxy/config.py.
      MCP_PROXY_GLOBAL_RATE_LIMIT_RPS:   "${MCP_PROXY_GLOBAL_RATE_LIMIT_RPS:-500}"
      MCP_PROXY_GLOBAL_RATE_LIMIT_BURST: "${MCP_PROXY_GLOBAL_RATE_LIMIT_BURST:-1000}"
      # ADR-013 layer 6 — DB latency circuit breaker. Exposed so chaos
      # scenarios can tighten the activation threshold enough to make
      # the breaker fire during a reasonable test window.
      MCP_PROXY_CB_DB_LATENCY_ACTIVATION_MS:      "${MCP_PROXY_CB_DB_LATENCY_ACTIVATION_MS:-500}"
      MCP_PROXY_CB_DB_LATENCY_DEACTIVATION_MS:    "${MCP_PROXY_CB_DB_LATENCY_DEACTIVATION_MS:-350}"
      MCP_PROXY_CB_DB_LATENCY_MAX_SHED_FRACTION:  "${MCP_PROXY_CB_DB_LATENCY_MAX_SHED_FRACTION:-0.95}"
      # ADR-013 Phase 4 — single-agent anomaly detector. Exposed so a
      # nightly validation run can lower thresholds enough that shadow
      # events actually fire inside the few-minute test window.
      MCP_PROXY_ANOMALY_QUARANTINE_MODE:          "${MCP_PROXY_ANOMALY_QUARANTINE_MODE:-shadow}"
      MCP_PROXY_ANOMALY_RATIO_THRESHOLD:          "${MCP_PROXY_ANOMALY_RATIO_THRESHOLD:-10.0}"
      MCP_PROXY_ANOMALY_ABSOLUTE_THRESHOLD_RPS:   "${MCP_PROXY_ANOMALY_ABSOLUTE_THRESHOLD_RPS:-100}"
      MCP_PROXY_ANOMALY_SUSTAINED_TICKS_REQUIRED: "${MCP_PROXY_ANOMALY_SUSTAINED_TICKS_REQUIRED:-3}"
      MCP_PROXY_ANOMALY_EVALUATION_INTERVAL_S:    "${MCP_PROXY_ANOMALY_EVALUATION_INTERVAL_S:-30}"
      MCP_PROXY_ANOMALY_CEILING_PER_MIN:          "${MCP_PROXY_ANOMALY_CEILING_PER_MIN:-3}"
      # ADR-014 — first-boot writes Org CA + nginx server cert into
      # the shared volume so the mastio-nginx-a sidecar can serve TLS
      # on 9443. SAN includes ``proxy-a`` (intra-network alias) and
      # ``localhost`` (host-side workload drivers).
      MCP_PROXY_NGINX_CERT_DIR: "/var/lib/mastio/nginx-certs"
      MCP_PROXY_NGINX_SAN: "proxy-a,localhost"
    volumes:
      - proxy-a-data:/data
      - mastio-a-nginx-certs:/var/lib/mastio/nginx-certs:rw
    networks:
      orga-internal:
        # ``mcp-proxy`` is the upstream name nginx/mastio/mastio.conf
        # hard-codes; alias here so the sidecar's ``proxy_pass``
        # resolves without forking the shared config.
        aliases: [proxy-a, mcp-proxy]
      public-wan:
        aliases: [proxy-a]
    expose: ["9100"]
    ports: ["9100:9100"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9100/health')"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  # ADR-014 — TLS terminator + mTLS gate for orga agents. Host port
  # 9443 is what test/nightly/workload/_common.py talks to.
  mastio-nginx-a:
    image: nginx:1.27-alpine
    depends_on:
      proxy-a:
        condition: service_healthy
    volumes:
      - ../../nginx/mastio:/etc/nginx/conf.d:ro
      - mastio-a-nginx-certs:/etc/nginx/certs:ro
    networks:
      orga-internal:
        aliases: [mastio-nginx-a]
    expose: ["9443"]
    ports: ["9443:9443"]
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          test -s /etc/nginx/certs/mastio-server.crt &&
          test -s /etc/nginx/certs/mastio-server.key &&
          test -s /etc/nginx/certs/org-ca.crt &&
          test -s /var/run/nginx.pid
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s

  # ── Org B Mastio (proxy) ──────────────────────────────────────────────────

  proxy-b-init:
    build:
      context: ../..
      dockerfile: sandbox/proxy-init/Dockerfile
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    environment:
      ORG_ID:              "orgb"
      BROKER_URL:          "http://broker:8000"
      PROXY_PUBLIC_URL:    "http://localhost:9200"
      PROXY_DB_PATH:       /data/mcp_proxy.db
      STATE_DIR:           /state
      SEED_MCP_RESOURCES:  "0"
    volumes:
      - ./state:/state:ro
      - proxy-b-data:/data
    restart: "no"

  proxy-b:
    build:
      context: ../..
      dockerfile: mcp_proxy/Dockerfile
    depends_on:
      proxy-b-init:
        condition: service_completed_successfully
    environment:
      MCP_PROXY_STANDALONE: "false"  # PR-D: explicit federated opt-in
      MCP_PROXY_BROKER_URL:        "http://broker:8000"
      MCP_PROXY_BROKER_JWKS_URL:   "http://broker:8000/.well-known/jwks.json"
      MCP_PROXY_ADMIN_SECRET:      "${PROXY_B_ADMIN_SECRET:-nightly-proxy-admin-b}"
      MCP_PROXY_DATABASE_URL:      "sqlite+aiosqlite:////data/mcp_proxy.db"
      MCP_PROXY_ORG_ID:            "orgb"
      MCP_PROXY_ALLOWED_ORIGINS:   "https://localhost:9543"
      MCP_PROXY_ENVIRONMENT:       "development"
      MCP_PROXY_FEDERATION_POLL_INTERVAL_S: "2"
      # ADR-014 — host-side smoke.py + workload drivers reach this Mastio
      # at https://localhost:9543 (mastio-nginx-b sidecar, port-mapped to
      # avoid the 9443 collision with proxy-a).
      MCP_PROXY_PROXY_PUBLIC_URL:  "https://localhost:9543"
      PROXY_INTRA_ORG:             "true"
      PROXY_TRANSPORT_INTRA_ORG:   "mtls-only"
      MCP_PROXY_LOCAL_AUTH_ENABLED: "true"
      MCP_PROXY_GLOBAL_RATE_LIMIT_RPS:   "${MCP_PROXY_GLOBAL_RATE_LIMIT_RPS:-500}"
      MCP_PROXY_GLOBAL_RATE_LIMIT_BURST: "${MCP_PROXY_GLOBAL_RATE_LIMIT_BURST:-1000}"
      MCP_PROXY_CB_DB_LATENCY_ACTIVATION_MS:      "${MCP_PROXY_CB_DB_LATENCY_ACTIVATION_MS:-500}"
      MCP_PROXY_CB_DB_LATENCY_DEACTIVATION_MS:    "${MCP_PROXY_CB_DB_LATENCY_DEACTIVATION_MS:-350}"
      MCP_PROXY_CB_DB_LATENCY_MAX_SHED_FRACTION:  "${MCP_PROXY_CB_DB_LATENCY_MAX_SHED_FRACTION:-0.95}"
      # ADR-013 Phase 4 — single-agent anomaly detector. Exposed so a
      # nightly validation run can lower thresholds enough that shadow
      # events actually fire inside the few-minute test window.
      MCP_PROXY_ANOMALY_QUARANTINE_MODE:          "${MCP_PROXY_ANOMALY_QUARANTINE_MODE:-shadow}"
      MCP_PROXY_ANOMALY_RATIO_THRESHOLD:          "${MCP_PROXY_ANOMALY_RATIO_THRESHOLD:-10.0}"
      MCP_PROXY_ANOMALY_ABSOLUTE_THRESHOLD_RPS:   "${MCP_PROXY_ANOMALY_ABSOLUTE_THRESHOLD_RPS:-100}"
      MCP_PROXY_ANOMALY_SUSTAINED_TICKS_REQUIRED: "${MCP_PROXY_ANOMALY_SUSTAINED_TICKS_REQUIRED:-3}"
      MCP_PROXY_ANOMALY_EVALUATION_INTERVAL_S:    "${MCP_PROXY_ANOMALY_EVALUATION_INTERVAL_S:-30}"
      MCP_PROXY_ANOMALY_CEILING_PER_MIN:          "${MCP_PROXY_ANOMALY_CEILING_PER_MIN:-3}"
      # ADR-014 — see proxy-a rationale.
      MCP_PROXY_NGINX_CERT_DIR: "/var/lib/mastio/nginx-certs"
      MCP_PROXY_NGINX_SAN: "proxy-b,localhost"
    volumes:
      - proxy-b-data:/data
      - mastio-b-nginx-certs:/var/lib/mastio/nginx-certs:rw
    networks:
      orgb-internal:
        aliases: [proxy-b, mcp-proxy]
      public-wan:
        aliases: [proxy-b]
    expose: ["9100"]
    ports: ["9200:9100"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9100/health')"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  # ADR-014 — TLS terminator + mTLS gate for orgb agents. Host port
  # 9543 keeps proxy-a's 9443 free; matches the smoke.py default.
  mastio-nginx-b:
    image: nginx:1.27-alpine
    depends_on:
      proxy-b:
        condition: service_healthy
    volumes:
      - ../../nginx/mastio:/etc/nginx/conf.d:ro
      - mastio-b-nginx-certs:/etc/nginx/certs:ro
    networks:
      orgb-internal:
        aliases: [mastio-nginx-b]
    expose: ["9443"]
    ports: ["9543:9443"]
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          test -s /etc/nginx/certs/mastio-server.crt &&
          test -s /etc/nginx/certs/mastio-server.key &&
          test -s /etc/nginx/certs/org-ca.crt &&
          test -s /var/run/nginx.pid
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s

  # ── Post-proxy-boot: pin mastio_pubkey + BYOCA enroll N agents ────────────

  bootstrap-mastio:
    build: ./bootstrap
    depends_on:
      broker:
        condition: service_healthy
      proxy-a:
        condition: service_healthy
      proxy-b:
        condition: service_healthy
    entrypoint: ["python", "/app/bootstrap_mastio.py"]
    environment:
      BROKER_URL:            "http://broker:8000"
      ADMIN_SECRET:          "${ADMIN_SECRET:-nightly-admin-secret-change-me}"
      PROXY_A_URL:           "http://proxy-a:9100"
      PROXY_A_ADMIN_SECRET:  "${PROXY_A_ADMIN_SECRET:-nightly-proxy-admin-a}"
      PROXY_B_URL:           "http://proxy-b:9100"
      PROXY_B_ADMIN_SECRET:  "${PROXY_B_ADMIN_SECRET:-nightly-proxy-admin-b}"
      BOOTSTRAP_SCOPE:       "full"
    volumes:
      - ./state:/state
    networks: [public-wan, orga-internal, orgb-internal]
    restart: "no"
