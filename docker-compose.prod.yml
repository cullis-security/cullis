# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This file removes dev-only services (mock PDPs, Jaeger UI exposure)
# and adds production hardening (restart policies, resource limits, logging).

services:

  # Remove mock PDP services in production (orgs run their own)
  mock-pdp-manufacturer:
    profiles: ["dev-only"]

  mock-pdp-buyer:
    profiles: ["dev-only"]

  broker:
    restart: always
    environment:
      OTEL_TRACES_SAMPLER_ARG: "0.1"   # Sample 10% of traces in production
      LOG_FORMAT: "json"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  postgres:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  redis:
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 512M

  vault:
    restart: always
    # In production, replace dev mode with proper Vault configuration:
    # - File or Consul storage backend
    # - TLS enabled
    # - Unsealing via cloud KMS or Shamir keys

  nginx:
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  jaeger:
    # In production, consider using Jaeger with Elasticsearch backend
    # or an external observability platform (Grafana Tempo, Datadog, etc.)
    restart: always
    ports: []   # Don't expose Jaeger UI publicly — access via SSH tunnel or VPN
