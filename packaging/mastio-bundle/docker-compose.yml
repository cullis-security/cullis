# =============================================================================
# Cullis Mastio — Org-Level Gateway + Built-in PDP (image-based bundle)
# =============================================================================
#
# Standalone Mastio on its own private docker network. The Mastio
# derives its Org CA + org_id at first boot (ADR-006 §2.2); the
# mastio-nginx sidecar (ADR-014) terminates TLS on host port 9443 with
# mTLS on /v1/(egress|agents). Zero broker dependency at boot.
# Federation ("allaccio al Court") is post-setup, opt-in via the
# dashboard /proxy/federation page.
#
# This compose pulls the published Mastio image from GHCR — no source
# tree required. Pin a specific release with CULLIS_MASTIO_VERSION
# (defaults to "latest").
#
# Usage:
#   ./deploy.sh                       # standalone (default)
#   ./deploy.sh --shared-broker       # join an existing Court network
#   ./deploy.sh --prod                # fail-fast on insecure defaults
#   ./deploy.sh --down                # stop + remove
# =============================================================================

services:

  mcp-proxy:
    image: ghcr.io/cullis-security/cullis-mastio:${CULLIS_MASTIO_VERSION:-latest}
    # ADR-014 — no host port publish. The Mastio listens on 9100 only
    # on proxy_net; the mastio-nginx sidecar below publishes 9443.
    expose:
      - "9100"
    environment:
      MCP_PROXY_ENVIRONMENT:       ${MCP_PROXY_ENVIRONMENT:-development}
      MCP_PROXY_STANDALONE:        ${MCP_PROXY_STANDALONE:-true}
      MCP_PROXY_ADMIN_SECRET:      ${MCP_PROXY_ADMIN_SECRET:-change-me-in-production}
      MCP_PROXY_DASHBOARD_SIGNING_KEY: ${MCP_PROXY_DASHBOARD_SIGNING_KEY:-}
      MCP_PROXY_DATABASE_URL:      sqlite+aiosqlite:////data/mcp_proxy.db
      MCP_PROXY_BROKER_URL:        ${MCP_PROXY_BROKER_URL:-}
      MCP_PROXY_BROKER_JWKS_URL:   ${MCP_PROXY_BROKER_JWKS_URL:-}
      MCP_PROXY_PDP_URL:           ${MCP_PROXY_PDP_URL:-http://mcp-proxy:9100/pdp/policy}
      # Default ``https://localhost:9443`` covers the dev / quick-try
      # path where the operator runs ``./deploy.sh`` on a laptop and
      # connects local agents at ``https://localhost:9443``. Production
      # deploys MUST override via ``proxy.env``: the agent's DPoP htu
      # carries the public hostname they actually reach the Mastio at,
      # and the server validates the proof against this exact URL +
      # path. Mismatch → 401 ``Invalid DPoP proof: htu mismatch`` on
      # every egress call. ``--proxy-headers`` (#346) does NOT
      # auto-detect this — htu validation requires the URL the agent
      # sees end-to-end, including the public hostname.
      MCP_PROXY_PROXY_PUBLIC_URL:  ${MCP_PROXY_PROXY_PUBLIC_URL:-https://localhost:9443}
      MCP_PROXY_ALLOWED_ORIGINS:   ${MCP_PROXY_ALLOWED_ORIGINS:-}
      MCP_PROXY_NGINX_CERT_DIR:    ${MCP_PROXY_NGINX_CERT_DIR:-/var/lib/mastio/nginx-certs}
      MCP_PROXY_NGINX_SAN:         ${MCP_PROXY_NGINX_SAN:-mastio.local,localhost}
      SSL_CERT_FILE:               ${MCP_PROXY_BROKER_CA_BUNDLE:-}
      REQUESTS_CA_BUNDLE:          ${MCP_PROXY_BROKER_CA_BUNDLE:-}
      MCP_PROXY_SECRET_BACKEND:    ${MCP_PROXY_SECRET_BACKEND:-env}
      MCP_PROXY_VAULT_ADDR:        ${MCP_PROXY_VAULT_ADDR:-}
      MCP_PROXY_VAULT_TOKEN:       ${MCP_PROXY_VAULT_TOKEN:-}
      PROXY_TRUST_DOMAIN:          ${PROXY_TRUST_DOMAIN:-}
      PROXY_INTRA_ORG:             ${PROXY_INTRA_ORG:-}
      PROXY_TRANSPORT_INTRA_ORG:   ${PROXY_TRANSPORT_INTRA_ORG:-}
      PROXY_EGRESS_INSPECTION_ENABLED: ${PROXY_EGRESS_INSPECTION_ENABLED:-}
      PROXY_FEDERATION_SYNC:       ${PROXY_FEDERATION_SYNC:-}
      CULLIS_EGRESS_DPOP_MODE:     ${CULLIS_EGRESS_DPOP_MODE:-}
    volumes:
      - mcp_proxy_data:/data
      # Optional corporate CA bundle. Mount a host directory at ./certs
      # if you need to trust an internal CA (env vars above point at
      # files under /certs only when MCP_PROXY_BROKER_CA_BUNDLE is set).
      - ${CULLIS_CERTS_DIR:-./certs}:/certs:ro
      # ADR-014 — shared volume for nginx sidecar TLS material. Mastio
      # writes; mastio-nginx mounts read-only.
      - mastio_nginx_certs:/var/lib/mastio/nginx-certs:rw
    networks:
      - proxy_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9100/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ADR-014 — TLS terminator + mTLS gate for Connector → Mastio.
  mastio-nginx:
    image: nginx:1.27-alpine
    ports:
      - "${MCP_PROXY_PORT:-9443}:9443"
    volumes:
      - ./nginx/mastio:/etc/nginx/conf.d:ro
      - mastio_nginx_certs:/etc/nginx/certs:ro
    depends_on:
      mcp-proxy:
        condition: service_healthy
    networks:
      - proxy_net
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          test -s /etc/nginx/certs/mastio-server.crt &&
          test -s /etc/nginx/certs/mastio-server.key &&
          test -s /etc/nginx/certs/org-ca.crt &&
          wget -q --no-check-certificate -O /dev/null https://localhost:9443/health
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  proxy_net:
    driver: bridge

volumes:
  mcp_proxy_data:
    driver: local
  mastio_nginx_certs:
    driver: local
