# Cullis Frontdesk — dev nginx (ADR-019 Phase 7).
#
# Production: replace this whole file with an oauth2-proxy + your IDP
# (Okta / Auth0 / Keycloak / EntraID / Google Workspace) sitting in front
# of the SPA. The only contracts the rest of the bundle relies on are:
#
#   1. EVERY request reaching the SPA / Ambassador carries
#      ``X-Forwarded-User`` set to the authenticated user (email or sub).
#   2. The reverse proxy's source IP is in CULLIS_TRUSTED_PROXIES on the
#      Connector (default 172.16.0.0/12 covers the docker bridge network).
#
# This dev nginx fakes step (1) with a ``?user=`` query-string switch the
# first time you load the page. It is NOT a security boundary; it exists
# only so a developer can dogfood the multi-user shared-mode flow without
# standing up a full IDP. Never expose to the public internet.

# Map the dev ?user= query to a fully-qualified principal email. The
# default placeholder makes "no ?user=" the unsafe path: the Ambassador
# will reject the unknown principal, surfacing the misconfig fast rather
# than falling back to a random user.
map $arg_user $forwarded_user {
    default      "unknown@frontdesk.dev";
    "daniele"    "daniele@acme.local";
    "mario"      "mario@acme.local";
    "anna"       "anna@acme.local";
    "luca"       "luca@beta.local";
}

# ── Upstream pools (PR #697 lineage, ported to Frontdesk 2026-05-20) ─────
#
# Without an explicit ``upstream { keepalive N; }`` block, nginx opens a
# fresh TCP socket to the upstream on every request — under sustained
# load (~600 RPS on a 16-core dev box, ~880 RPS / 10 VUs on a 2-vCPU
# sandbox) the ephemeral port pool exhausts and the sidecar starts
# logging ``connect() failed (99: Address not available)`` while the
# client sees 502. The pools below keep upstream sockets warm and lift
# the throughput ceiling 5-10x. Combine with
# ``proxy_set_header Connection $connection_upgrade;`` on every
# ``location`` (declared via the map in 00-maps.conf) so nginx does not
# emit ``Connection: close`` and immediately close the pooled socket.
#
# The Mastio bundle ships the same pattern at
# ``packaging/mastio-bundle/nginx/mastio/mastio.conf``; keep the two in
# sync when extending.
upstream connector_upstream {
    server connector:7777;
    keepalive 64;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

upstream cullis_chat_upstream {
    server cullis-chat:8080;
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

server {
    listen 80 default_server;
    server_name _;

    # Hide nginx version in error pages / Server header.
    server_tokens off;

    # Docker's embedded DNS — kept for resilience even though the
    # upstream blocks above resolve the service name at config-load.
    # If the docker bridge re-assigns the upstream IP (compose
    # ``up --force-recreate``), the static resolution becomes stale;
    # without a resolver nginx then surfaces 502 until reload. With it,
    # nginx re-resolves on the next keepalive idle window.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 3s;

    # ----- security headers (ADR-019 Phase 8b-2b) -----
    #
    # Set on every response. The SPA in static mode no longer carries
    # the per-request CSP nonce middleware that pre-Phase-8b's Astro
    # server had; the policy here applies to the prerendered HTML and
    # to the proxied /api + /v1 responses.
    #
    # ``script-src 'unsafe-inline'`` is a deliberate pragmatic choice
    # while we ship Phase 8b-2b: Astro's bootstrap inline scripts and
    # our two custom inline blocks (TopBar audit toggle, ChatLayout
    # pre-paint hydrate) need either nonce, hash, or unsafe-inline. The
    # nonce path requires an Astro middleware (gone) or a server-side
    # injector. Auto-hash via Astro's experimental CSP is the right
    # follow-up; tracked separately.
    # IMPORTANT: keep this on a single physical line.
    #
    # Nginx does NOT interpret a trailing backslash inside a string
    # argument as line-continuation — it copies the literal "\" + the
    # following whitespace into the response header. Browsers then stop
    # parsing the CSP at the first stray "\" and only apply
    # ``default-src 'self'``. ``script-src 'unsafe-inline'`` is silently
    # dropped, Astro's hydration scripts are blocked, the SPA never
    # mounts, the LoginForm submit button stays disabled (its enabled
    # state is set by React state that never initialises). The visible
    # symptom is "click does nothing" with a wall of CSP errors in
    # DevTools.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://api.fontshare.com; font-src 'self' https://fonts.gstatic.com https://api.fontshare.com https://cdn.fontshare.com data:; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ----- /api/session/*: bypass the SPA, straight to the Ambassador -----
    #
    # init mints the cookie from X-Forwarded-User (shared mode) or the
    # local Bearer (single mode); whoami reads it back; logout clears
    # it. All three live on the Connector after ADR-019 Phase 8a + 8b-2a;
    # the SPA's old Astro server-side equivalents are gone (Phase 8b-2b).
    #
    # NOTE: only mounted on the Connector when AMBASSADOR_MODE=shared.
    # In ADR-025 local-auth mode (default since v0.2.0-rc2) the SPA hits
    # /api/auth/* below instead; the 404 surfaced here in local mode is
    # by design.
    location /api/session/ {
        proxy_pass http://connector_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Keepalive pool helper — see 00-maps.conf for the rationale.
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Forwarded-User $forwarded_user;
    }

    # ----- /api/auth/*: ADR-025 local-auth login flow ---------------------
    #
    # Mounted on the Connector when AUTH_MODE=local (the v0.2.0-rc2
    # default). Surfaces /login + /change-password + /whoami-local +
    # /logout + /runtime-info + /reprovision. The SPA LoginForm and
    # ChangePasswordForm components POST here directly. ``X-Forwarded-User``
    # is intentionally NOT injected — local-auth verifies the password
    # against bcrypt in users.db, no upstream identity claim required.
    location /api/auth/ {
        proxy_pass http://connector_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Keepalive pool helper — see 00-maps.conf for the rationale.
        proxy_set_header Connection $connection_upgrade;
    }

    # ----- /admin/*: ADR-025 admin Users / audit endpoints -----------------
    #
    # ``X-Admin-Secret`` gated on the Connector. The AdminUsers SPA tab
    # pulls these to provision/list/delete/reset users; ops also calls
    # them with curl. The secret never reaches nginx (it's only on the
    # caller's request header), so no special handling here besides the
    # passthrough.
    location /admin/ {
        proxy_pass http://connector_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Keepalive pool helper — see 00-maps.conf for the rationale.
        proxy_set_header Connection $connection_upgrade;
    }

    # ----- /v1/*: bypass the SPA, direct to the Ambassador -----
    #
    # ``require_bearer`` on the Ambassador accepts the cookie minted by
    # /api/session/init, so the SPA can hit /v1/chat/completions,
    # /v1/models, /v1/mcp, /v1/ambassador/health directly. SSE streaming
    # wiring (proxy_buffering off, long read timeout) inlined here.
    location /v1/ {
        proxy_pass http://connector_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Keepalive pool helper — see 00-maps.conf for the rationale.
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Forwarded-User $forwarded_user;
        # SSE chat streaming.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ----- /setup, /waiting, /api/setup/*, /api/status: Connector wizard -----
    #
    # PR3 of the Frontdesk setup wizard plan: when the bundle starts in
    # browser-wizard mode (no CULLIS_SITE_URL configured, no enrolled
    # identity yet), the operator opens /setup/discover in the browser
    # and the Connector handles the auto-discovery + TOFU pin + device-
    # code enrollment flow inline. These paths were previously routed
    # to the SPA catch-all below, which would 404 because the SPA
    # doesn't define them.
    #
    # Regex match wins over the prefix ``location /`` for the SPA, so
    # this block must NOT be moved below it. The alternation covers:
    #   /setup, /setup/discover, /setup/discover/select,
    #   /setup/preview-ca, /setup/pin-ca
    #   /waiting (HTMX-polled spinner during admin approval)
    #   /api/setup/discover/results (HTMX probe results endpoint)
    #   /api/status (HTMX poll for enrollment status)
    location ~ ^/(setup|api/setup|waiting|api/status)(/.*)?$ {
        proxy_pass http://connector_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Keepalive pool helper — see 00-maps.conf for the rationale.
        proxy_set_header Connection $connection_upgrade;
    }

    # ----- /static/*: Connector wizard assets (CSS, htmx, SVG) -----
    #
    # The Connector wizard templates (``setup_discovery.html`` etc.)
    # reference ``/static/style.css``, ``/static/htmx.min.js``,
    # ``/static/cullis-mark.svg``, ``/static/favicon.svg`` — those live
    # in ``cullis_connector/static/`` and are served by the Connector
    # on ``:7777``. Without this block, the catch-all ``location /``
    # below would send ``/static/*`` to the Cullis Chat SPA, which has
    # no concept of that path and returns its ``index.html`` fallback
    # (12.5 KB of HTML, Content-Type: text/html). The wizard then
    # renders unstyled with broken images. Issue #640.
    #
    # The Cullis Chat SPA itself uses ``/_astro/...`` for its hashed
    # bundle and serves top-level ``cullis-mark.svg`` etc., never
    # ``/static/``, so this namespace is free.
    location /static/ {
        proxy_pass http://connector_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Keepalive pool helper — see 00-maps.conf for the rationale.
        proxy_set_header Connection $connection_upgrade;
    }

    # ----- gate ``/`` on a session cookie (Frontdesk shared mode) -----
    #
    # Without a local session cookie a fresh visitor (new phone, fresh
    # incognito) would land on the SPA shell and the SPA would render
    # the chat surface with the workload principal as fallback identity.
    # The backend then refuses the actual chat call (the user is not a
    # provisioned principal), leaving the user stuck on a logged-in-
    # looking screen they cannot use. Send them to /login instead.
    #
    # Exact match ``=`` has higher priority than the prefix catch-all
    # below, so this block only fires for an empty path. Every other
    # path (including direct typing of ``/chat`` or a deep link) still
    # falls through to the SPA; the SPA's own client-side router is
    # expected to handle its own unauthenticated state for those.
    #
    # The ``if`` is safe here because it only carries ``return`` (the
    # one usage explicitly endorsed by the nginx ifIsEvil page); no
    # ``proxy_pass``/``rewrite`` mixed in.
    #
    # Reported by the operator from a phone on the LAN-exposed dogfood
    # VM 2026-05-20: opening the bundle root URL dropped them straight
    # into chat as the workload principal with no way to send messages.
    location = / {
        # Emit a path-only Location on the redirect below so the browser
        # resolves it against the actual origin (host:port the bundle is
        # published on). The default ``absolute_redirect on`` synthesises
        # ``http://<server_name>/login`` and drops the operator-chosen
        # port, which breaks LAN-exposed deployments (the phone would
        # hit ``http://localhost/login`` on itself).
        absolute_redirect off;
        # Require a non-empty cookie value, not just the name + ``=``.
        # The downstream Python gate at cullis_connector/web.py root()
        # treats ``Cookie: cullis_local_session=`` (empty value) as
        # unauthenticated; the nginx match must agree, otherwise a
        # trivially-crafted empty cookie tunnels past the gate into
        # the SPA shell and the visitor lands on the broken logged-in-
        # looking surface the gate was added to eliminate. Pattern:
        # any non-``;`` non-whitespace character right after the ``=``.
        if ($http_cookie !~* "(?:^|;\s*)cullis_local_session=[^;\s]") {
            return 303 /login;
        }
        proxy_pass http://cullis_chat_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection $connection_upgrade;
    }

    # ----- everything else: static SPA via the cullis-chat container -----
    #
    # The cullis-chat container ships nginx-static (port 8080) serving
    # the prerendered Astro output. No Astro server in this topology;
    # the SPA's own /api/* routes were deleted in Phase 8b-2b along
    # with switching the Astro config to ``output: 'static'``.
    location / {
        proxy_pass http://cullis_chat_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Keepalive pool helper — see 00-maps.conf for the rationale.
        proxy_set_header Connection $connection_upgrade;
        # The nginx-static SPA inside cullis-chat emits absolute
        # ``Location: http://<Host>:8080/...`` redirects on dir-norm
        # 301s (``/login`` → ``/login/``) because the upstream port
        # is baked into the static container's config and it has no
        # idea what port the bundle is published on. Rewrite to a
        # path-only Location so the browser resolves the redirect
        # against the current origin (whatever host:port the operator
        # actually picked). Memory:
        # feedback_nginx_static_absolute_redirects. The TLS sidecar
        # does the same rewrite via
        # ``proxy_redirect http://$host:8080/ https://$http_host/``
        # when ``--tls`` is on; this directive is the HTTP-only
        # counterpart so the bundle works whether or not the sidecar
        # profile is enabled. Caught by sandbox-frontdesk dogfood
        # 2026-05-19 — without it, ``open http://localhost:18080/login``
        # bounces the browser to ``http://localhost:8080/login/``
        # (the upstream container port) and the user sees ``connection
        # refused``.
        # The SPA's nginx emits Location with the *request* Host's
        # hostname (stripped of incoming port) plus its own internal
        # 8080 listen port — so a curl with ``Host: localhost:18080``
        # gets ``Location: http://localhost:8080/login/`` and a curl
        # with ``Host: cullis-chat:8080`` gets
        # ``Location: http://cullis-chat:8080/login/``. A
        # static-string ``proxy_redirect http://cullis-chat:8080/``
        # only catches the second shape. Match ANY upstream
        # ``http://<host>[:port]<path>`` and rewrite back to the
        # request's own scheme + Host so the browser follows the
        # redirect on the same origin it started from (whatever
        # port the bundle is published on, with or without TLS in
        # front).
        # ``$effective_scheme`` (declared in 00-maps.conf) honours the
        # sidecar's ``X-Forwarded-Proto: https`` when one is present,
        # falling back to ``$scheme`` for HTTP-only deployments. Using
        # plain ``$scheme`` here downgrades HTTPS→HTTP behind the TLS
        # sidecar because the sidecar→inner hop is plain HTTP.
        proxy_redirect ~^https?://[^/]+(/.*)$ $effective_scheme://$http_host$1;
    }
}
