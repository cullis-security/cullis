# =============================================================================
# Cullis Frontdesk — multi-user shared-mode container bundle (ADR-019 Phase 7)
# =============================================================================
#
# Three services on a private docker network. All three pull from
# ghcr.io — the bundle no longer requires a repo checkout or local
# ``docker build``.
#
#   nginx          80   reverse proxy
#     ↓
#   cullis-chat    8080 nginx-static SPA, Frontdesk-branded build
#                       (ghcr.io/cullis-security/cullis-chat-frontdesk)
#     ↓
#   connector      7777 cullis-connector dashboard + ADR-025 local-auth
#                       (ghcr.io/cullis-security/cullis-connector)
#     ↓ DPoP+mTLS
#   [Cullis Mastio cloud — out of scope for this bundle]
#
# Prerequisites:
#
#   1. A Mastio is reachable from this host (separate deploy, see
#      packaging/mastio-bundle/).
#   2. A trust anchor PEM for the Mastio's TLS certificate, exported as
#      CULLIS_FRONTDESK_CA_BUNDLE_HOST in frontdesk.env. Required.
#   3. The Connector has been enrolled against that Mastio. Enrollment
#      writes identity material to ``./connector_data``; without it the
#      Ambassador comes up but cannot reach Mastio.
#
# Usage:
#
#   ./deploy.sh                                  # generates frontdesk.env if
#                                                # missing, runs the one-shot
#                                                # enrollment, brings up the
#                                                # stack, waits for health
#   open http://localhost:8080/login             # ADR-025 local-auth login
#                                                # form (default: AUTH_MODE=local)
#
#   Run ``docker compose --env-file frontdesk.env up -d`` directly only if
#   you have already enrolled the Connector and provisioned frontdesk.env
#   by hand (see ./deploy.sh source for the underlying steps).
#
# Default auth: ADR-025 ``AUTH_MODE=local`` ships a real /login form
# backed by users.db (bcrypt hashed). The admin pre-creates accounts
# via ``POST /admin/users`` with ``X-Admin-Secret``, then employees
# sign in. Per-user UserPrincipal certs are minted by the sibling
# Mastio after each login (post-login CSR flow).
#
# Legacy fake-SSO mode: set ``AMBASSADOR_MODE=shared`` in frontdesk.env
# to fall back to the pre-v0.2.0 ``X-Forwarded-User``-injected pattern.
# Trusted proxies guard required (``CULLIS_TRUSTED_PROXIES``).
#
# Production: in either mode, replace nginx with oauth2-proxy + your
# IdP for the strongest posture (TLS termination + corporate MFA +
# OIDC delegation back to Mastio).
# =============================================================================

services:

  # ── Init: ensure connector_data ownership matches the cullis user ──
  # The cullis-connector image runs as user ``cullis`` (uid 10001).
  # Docker's bind mount preserves the host directory's owner, which on
  # Linux is typically the operator's uid (1000). Without this init
  # step the connector container fails the first write to
  # /home/cullis/.cullis with ``Permission denied``. Run a tiny busybox
  # as root to chown the bind target before the connector starts. The
  # service exits 0 on success and the connector's depends_on gates on
  # service_completed_successfully.
  init-permissions:
    image: busybox:stable
    user: "0:0"
    command: ["sh", "-c", "chown -R 10001:10001 /data && echo ok"]
    volumes:
      - ${CONNECTOR_DATA_DIR:-./connector_data}:/data
    restart: "no"
    networks:
      - frontdesk_net

  connector:
    image: ghcr.io/cullis-security/cullis-connector:${CONNECTOR_VERSION:-0.4.0}
    # ``dashboard`` mounts the local-auth router (ADR-025) by default; the
    # legacy fake-SSO Ambassador shared-mode is reachable by setting
    # ``AMBASSADOR_MODE=shared`` explicitly in frontdesk.env. ADR-025
    # gives a real /login form, bcrypt-hashed users.db, and per-user
    # UserPrincipal certs minted by the sibling Mastio.
    command: >
      dashboard
      --host 0.0.0.0
      --port 7777
      --no-open-browser
      --profile ${CONNECTOR_PROFILE:-frontdesk}
    expose:
      - "7777"
    environment:
      # ADR-025 dual-mode auth. ``local`` (default) gives the SPA a real
      # /login form backed by users.db; admin pre-creates accounts via
      # POST /admin/users with X-Admin-Secret. To fall back to the
      # legacy ``X-Forwarded-User``-based shared-mode SSO that the bundle
      # shipped before v0.2.0, set ``AMBASSADOR_MODE=shared`` in
      # frontdesk.env explicitly (also requires CULLIS_TRUSTED_PROXIES).
      AUTH_MODE: ${AUTH_MODE:-local}
      AMBASSADOR_MODE: ${AMBASSADOR_MODE:-}
      CULLIS_CONNECTOR_ADMIN_SECRET: ${CULLIS_CONNECTOR_ADMIN_SECRET:-}
      # Loopback enforcement is the right default on a laptop where the
      # Ambassador binds to 127.0.0.1, but on the Frontdesk bundle the
      # Ambassador sits behind nginx on a private docker bridge, so the
      # TCP peer is the nginx sidecar IP (172.x.x.x), not loopback —
      # leaving the guard on returns 403 ``Ambassador only accepts
      # loopback connections`` on every /api/session/init from the SPA.
      CULLIS_AMBASSADOR_LOOPBACK_ONLY: ${CULLIS_AMBASSADOR_LOOPBACK_ONLY:-false}
      # Comma-separated list of models the SPA's model picker offers
      # when the Connector cannot fetch a live list from the Mastio.
      # Mirror this with /proxy/ai-providers on the Mastio so SSO chat
      # actually routes — listing a model here without a configured
      # provider returns 502.
      CULLIS_ADVERTISED_MODELS: ${CULLIS_ADVERTISED_MODELS:-}
      # SDK / Connector → Mastio request timeout. 10 s default is fine
      # for cloud Claude (~3 s) but Ollama chain-of-thought models on
      # the host can take 30-60 s. Pair with the Mastio's
      # MCP_PROXY_AI_GATEWAY_REQUEST_TIMEOUT_S so the deadline ladder
      # is consistent end-to-end.
      CULLIS_REQUEST_TIMEOUT_S: ${CULLIS_REQUEST_TIMEOUT_S:-180}
      # ADR-025 session cookie gets a ``Secure`` flag by default so
      # production deployments (TLS-terminated at the nginx edge) refuse
      # to leak it on HTTP. Browsers treat ``localhost`` as a "secure
      # context" anyway, so the dogfood-on-laptop case keeps working
      # with the flag on. But on a LAN IP (192.168.x.x) accessed from a
      # phone over plain HTTP, the browser will drop the cookie on every
      # request after login — flipping this to ``1`` removes the Secure
      # flag and lets the LAN demo flow through. **Cookie travels in
      # clear over the LAN** when this is on, so do not enable it in
      # production.
      CULLIS_CONNECTOR_DEV: ${CULLIS_CONNECTOR_DEV:-}
      CULLIS_FRONTDESK_ORG_ID: ${CULLIS_FRONTDESK_ORG_ID}
      CULLIS_FRONTDESK_TRUST_DOMAIN: ${CULLIS_FRONTDESK_TRUST_DOMAIN}
      # Trust the docker bridge network so X-Forwarded-User from nginx is
      # accepted when (and only when) AMBASSADOR_MODE=shared. Default
      # covers the bridge networks docker hands out (172.16.0.0/12).
      CULLIS_TRUSTED_PROXIES: ${CULLIS_TRUSTED_PROXIES:-127.0.0.1/32,::1/128,172.16.0.0/12}
      CULLIS_FRONTDESK_COOKIE_TTL_S: ${CULLIS_FRONTDESK_COOKIE_TTL_S:-3600}
      # Where Mastio's CSR endpoint lives. Falls back to site_url when empty.
      CULLIS_FRONTDESK_MASTIO_URL: ${CULLIS_FRONTDESK_MASTIO_URL:-}
      CULLIS_SITE_URL: ${CULLIS_SITE_URL:-}
      # Trust anchor for the Mastio TLS handshake. Production uses the
      # corporate PKI; the sandbox/ ships a self-signed Org-CA so we
      # mount it as a CA bundle here. Honoured by Python's ssl module
      # (cullis-connector + the Mastio CSR client both pick it up).
      SSL_CERT_FILE: ${CULLIS_FRONTDESK_CA_BUNDLE:-/etc/cullis/ca-bundle.pem}
      REQUESTS_CA_BUNDLE: ${CULLIS_FRONTDESK_CA_BUNDLE:-/etc/cullis/ca-bundle.pem}
    volumes:
      # Connector identity material (cert, key, profile config). Populated
      # by the one-shot enrollment documented in the header comment.
      # The cullis-connector image runs as user ``cullis`` whose home is
      # ``/home/cullis`` — mount the bind directory there so identity
      # writes survive container recreation.
      - ${CONNECTOR_DATA_DIR:-./connector_data}:/home/cullis/.cullis
      # CA bundle for Mastio TLS verification. Path inside the container
      # is referenced by SSL_CERT_FILE / REQUESTS_CA_BUNDLE. Required —
      # docker compose substitution leaves the path empty if the env var
      # is unset, which causes the bind mount to fail with a clear error
      # at ``up`` time rather than producing a silent TLS handshake
      # failure later. Export ``CULLIS_FRONTDESK_CA_BUNDLE_HOST`` in
      # frontdesk.env to point at your Mastio's CA chain (or the org's
      # corporate root if Mastio TLS is rooted there).
      - ${CULLIS_FRONTDESK_CA_BUNDLE_HOST:?must point to your Mastio CA chain PEM}:/etc/cullis/ca-bundle.pem:ro
    # On Linux ``host.docker.internal:host-gateway`` resolves to the
    # docker0 bridge IP (172.17.0.1) — which is unreachable across
    # custom docker bridges because of iptables FORWARD policy. The
    # Mastio bundle is on a different bridge, so the Connector
    # times out on every CSR / chat round trip.
    # Fix: attach the Mastio nginx sidecar to this network at boot
    # (see deploy.sh) and let docker DNS resolve ``host.docker.internal``
    # to the Mastio's address inside this bridge. ``extra_hosts`` is
    # omitted so /etc/hosts does not pre-empt the docker DNS alias.
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    networks:
      - frontdesk_net
    restart: unless-stopped

  cullis-chat:
    # Frontdesk-branded SPA published by release-chat.yml on every
    # ``chat-vX.Y.Z`` tag (matrix build, see ``release-chat.yml``).
    # The image is nginx-static on port 8080 serving prerendered HTML
    # + bundled JS/CSS. /api/session/* and /v1/* proxying to the
    # Connector happens in the outer nginx layer below; this inner
    # container only serves static assets.
    image: ghcr.io/cullis-security/cullis-chat-frontdesk:${CHAT_VERSION:-0.3.0}
    expose:
      - "8080"
    depends_on:
      - connector
    networks:
      - frontdesk_net
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      # Bind to 127.0.0.1 by default — Frontdesk serves plain HTTP and
      # leaks the SPA session cookie on any non-loopback path. Localhost
      # is a W3C "secure context" (SPA crypto + Secure cookies + Service
      # Workers all work as if on HTTPS), so dogfood and single-user
      # evaluations on the same host are safe. To expose on the LAN or
      # the public internet, override FRONTDESK_HTTP_BIND to ``0.0.0.0``
      # AND put a TLS terminator (oauth2-proxy / Caddy / Traefik / nginx)
      # in front. Doing one without the other is incoherent with the
      # zero-trust threat model — see README "Threat model & exposure".
      - "${FRONTDESK_HTTP_BIND:-127.0.0.1}:${FRONTDESK_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - cullis-chat
    networks:
      - frontdesk_net
    restart: unless-stopped

volumes:
  # Persistent Connector identity. Survives `docker compose down`. Wipe
  # only if you want to re-enroll the Connector from scratch.
  connector_data:

networks:
  frontdesk_net:
    driver: bridge
