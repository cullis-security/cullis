# =============================================================================
# Cullis Frontdesk — TLS terminator sidecar (ADR-024 / issue #655)
# =============================================================================
#
# Listens on 8443 with a self-signed cert minted at deploy time by
# ``./deploy.sh`` (via ``docker run nginx:1.27-alpine openssl`` so the
# host needs no openssl install). Reverse-proxies to the inner
# ``nginx`` service on port 80, which keeps doing the SPA + Connector
# fan-out it already does today.
#
# Why a separate sidecar instead of bolting TLS onto the inner nginx:
#   * Additive — operators with an external TLS terminator (oauth2-
#     proxy, Caddy, Traefik, corporate ingress) flip
#     ``FRONTDESK_TLS=disabled`` and the inner :80 path stays
#     unchanged. No behavioural drift between the two modes.
#   * Mirrors the Mastio bundle's ``mastio-nginx`` pattern (ADR-014),
#     so the operator sees one consistent topology across both
#     bundles.
#   * The X-Forwarded-Proto + Host headers travel through to the
#     Connector so its ADR-025 session cookies pick up the
#     ``Secure`` flag automatically when the request arrived via
#     HTTPS. Without that the SPA loses cookies on every navigation.
# =============================================================================

# Keepalive pool to the inner nginx — same pattern as the inner nginx
# uses toward the Connector / cullis-chat upstreams (00-maps.conf +
# default.conf in this bundle, mirrored from Mastio PR #697). Without
# this and with the pre-fix ``set $inner_upstream … proxy_pass $var;``
# pattern, nginx forced per-request DNS resolution AND opened a new
# TCP socket every time, doubling the port-exhaustion risk on the way
# in (TLS hop) and on the way through (inner hop).
upstream inner_nginx_upstream {
    server nginx:80;
    keepalive 64;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

server {
    listen 8443 ssl;
    http2 on;
    server_name _;
    server_tokens off;

    ssl_certificate     /etc/nginx/certs/frontdesk-server.crt;
    ssl_certificate_key /etc/nginx/certs/frontdesk-server.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 10m;
    ssl_session_cache   shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    client_max_body_size 16m;

    # Docker's embedded DNS — required because the upstream is a
    # docker service name resolved at runtime, not start. Without an
    # explicit resolver nginx fails ``no resolver defined`` and
    # surfaces 502 to the browser.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 3s;

    # Health endpoint terminates here. Used by the docker healthcheck
    # below and by ``./deploy.sh`` to confirm TLS came up before
    # printing the success summary.
    location = /tls-health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # ───────────────────────────────────────────────────────────────
    # Everything else: terminate TLS, hand to the inner nginx that
    # already knows the SPA + Connector routing rules. The inner
    # nginx listens on plain HTTP port 80 on the docker bridge — host
    # port 8080 is unaffected.
    # ───────────────────────────────────────────────────────────────
    location / {
        # Named upstream (above) — keeps a warm TCP pool to the inner
        # nginx, so high-RPS demo traffic does not burn ephemeral ports
        # at the TLS hop. The pre-fix ``set $inner_upstream … ;
        # proxy_pass $var;`` form disabled keepalive pooling entirely
        # because nginx requires a literal upstream name in
        # ``proxy_pass`` to bind to a ``keepalive`` pool.
        proxy_pass http://inner_nginx_upstream;
        proxy_http_version 1.1;
        # $http_host preserves the port the browser sent (e.g.
        # 192.168.122.87:8443), while $host strips it. The Connector
        # CSRF middleware (cullis_connector/web.py:881) builds
        # expected_origins from request.url.netloc which is derived
        # from this Host header; if the port is missing here, the
        # browser's Origin header (which always includes a non-default
        # port like :8443) will not match and every POST /setup/*
        # request from the in-browser enrollment wizard gets a 403
        # ``cross-origin request blocked``. Setting $http_host keeps
        # the netloc intact through both proxy hops.
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_set_header X-Forwarded-Port  $server_port;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        # The inner cullis-chat-frontdesk nginx emits absolute Location
        # headers like ``http://$host:8080/login/`` on a trailing-slash
        # 301 because it sees neither X-Forwarded-Proto nor an HTTPS
        # listening port — it knows only its own :8080 listener. Without
        # rewriting, the browser follows the 301 from
        # https://host:8443/login to http://host:8080/login/, which
        # silently downgrades the scheme AND breaks the cookie Secure
        # flag the SPA depends on. ``proxy_redirect`` rewrites the
        # Location header before it leaves the sidecar so the browser
        # stays on the public HTTPS face. ``$http_host`` carries the
        # request's Host:port verbatim (e.g. ``192.168.122.170:8443``).
        proxy_redirect http://$host:8080/ https://$http_host/;
        proxy_redirect http://$host/      https://$http_host/;

        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 5s;

        proxy_buffering off;
    }
}

# NOTE: the ``$connection_upgrade`` map referenced above lives in
# ``00-maps.conf`` (same dir, mounted alongside this file in the
# compose service). nginx loads ``conf.d/*.conf`` in lexicographic
# order inside the ``http {}`` context, so the map is in scope by the
# time this server block is parsed. Pattern matches the Mastio bundle
# (``packaging/mastio-bundle/nginx/mastio/00-maps.conf``).
