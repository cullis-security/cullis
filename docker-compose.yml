services:

  nginx:
    image: nginx:alpine
    ports:
      - "8443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      broker:
        condition: service_healthy
    restart: unless-stopped

  vault:
    image: hashicorp/vault:1.17
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-dev-root-token}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://localhost:8200"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atn
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atn}
      POSTGRES_DB: agent_trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atn -d agent_trust"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:1.58
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  mock-pdp-manufacturer:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
    command: python agents/mock_pdp.py --org manufacturer --port 9000
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  mock-pdp-buyer:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
    command: python agents/mock_pdp.py --org buyer --port 9001
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9001/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  broker:
    build: .
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://atn:${POSTGRES_PASSWORD:-atn}@postgres:5432/agent_trust
      BROKER_CA_KEY_PATH: /app/certs/broker-ca-key.pem
      BROKER_CA_CERT_PATH: /app/certs/broker-ca.pem
      ADMIN_SECRET: ${ADMIN_SECRET:-change-me-in-production}
      TRUST_DOMAIN: ${TRUST_DOMAIN:-atn.local}
      BROKER_PUBLIC_URL: ${BROKER_PUBLIC_URL:-https://localhost:8443}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      INJECTION_LLM_JUDGE_ENABLED: ${INJECTION_LLM_JUDGE_ENABLED:-false}
      # Redis — DPoP JTI store, rate limiting, WebSocket pub/sub
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      # KMS — set KMS_BACKEND=vault to use HashiCorp Vault instead of local disk
      KMS_BACKEND: ${KMS_BACKEND:-vault}
      VAULT_ADDR: ${VAULT_ADDR:-http://vault:8200}
      VAULT_TOKEN: ${VAULT_TOKEN:-dev-root-token}
      VAULT_SECRET_PATH: ${VAULT_SECRET_PATH:-secret/data/broker}
      VAULT_ALLOW_HTTP: "true"  # Dev only — Vault in Docker uses HTTP
      # Policy backend — use OPA instead of webhooks for enterprise lab
      POLICY_BACKEND: ${POLICY_BACKEND:-webhook}
      OPA_URL: ${OPA_URL:-}
      POLICY_ENFORCEMENT: ${POLICY_ENFORCEMENT:-true}
      # OpenTelemetry
      OTEL_ENABLED: "true"
      OTEL_SERVICE_NAME: "cullis-broker"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
      OTEL_EXPORTER_INSECURE: "true"
      # Reverse proxy
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-172.16.0.0/12}  # restrict to Docker internal network
    volumes:
      - ./certs:/app/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

volumes:
  postgres_data:
