<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Connector{% endblock %} — Cullis Connector</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&display=swap" rel="stylesheet">
    <script src="/static/htmx.min.js" defer></script>
</head>
<body>
<div class="shell">
    <header class="topbar">
        <div class="brand">
            <img class="brand-mark" src="/static/cullis-mark.svg" alt="Cullis" aria-hidden="true">
            <div class="brand-text">
                <span class="brand-name">Cullis</span>
                <div class="brand-role-row">
                    <span class="brand-role-chip">Connector</span>
                    {% if active_profile %}
                    <a href="/profiles" class="brand-role-sub brand-role-sub-link" title="Manage profiles">Profile · {{ active_profile }}</a>
                    {% else %}
                    <span class="brand-role-sub">Local Edge · Your Machine</span>
                    {% endif %}
                </div>
            </div>
        </div>
        <div class="topbar-status">
            {% block topbar_status %}
            <span class="status-chip {% if connector_status == 'online' %}online{% elif connector_status == 'waiting' %}waiting{% endif %}">
                <span class="status-dot {% if connector_status != 'offline' %}pulse{% endif %}"></span>
                {{ connector_status_label or 'Offline' }}
            </span>
            {% endblock %}
        </div>
    </header>

    <main class="stage">
        <div class="stage-inner">
            {% block content %}{% endblock %}
        </div>
    </main>
</div>

<div class="toast-box" id="toast-box"></div>

<script>
function showToast(msg) {
    var box = document.getElementById('toast-box');
    var t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    box.appendChild(t);
    setTimeout(function(){ t.remove(); }, 2600);
}

function copyText(text) {
    if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(function(){ showToast('Copied to clipboard'); });
    } else {
        var ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); ta.remove();
        showToast('Copied to clipboard');
    }
}
</script>

{% block after_body %}{% endblock %}
</body>
</html>
