apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cullis-mastio.configMapName" . }}
  labels:
    {{- include "cullis-mastio.proxy.labels" . | nindent 4 }}
data:
  MCP_PROXY_ENVIRONMENT: {{ .Values.proxy.environment | quote }}
  MCP_PROXY_HOST: "0.0.0.0"
  MCP_PROXY_PORT: {{ .Values.proxy.containerPort | quote }}

  # #114 — standalone mode toggles broker uplink off.
  MCP_PROXY_STANDALONE: {{ .Values.proxy.standalone | default false | quote }}

  {{- if .Values.proxy.brokerUrl }}
  MCP_PROXY_BROKER_URL: {{ .Values.proxy.brokerUrl | quote }}
  {{- end }}
  {{- if .Values.proxy.brokerJwksUrl }}
  MCP_PROXY_BROKER_JWKS_URL: {{ .Values.proxy.brokerJwksUrl | quote }}
  {{- end }}
  MCP_PROXY_BROKER_VERIFY_TLS: {{ .Values.proxy.brokerVerifyTls | quote }}

  {{- if .Values.proxy.proxyPublicUrl }}
  MCP_PROXY_PROXY_PUBLIC_URL: {{ .Values.proxy.proxyPublicUrl | quote }}
  {{- else if .Values.ingress.enabled }}
  MCP_PROXY_PROXY_PUBLIC_URL: {{ printf "%s://%s" (ternary "https" "http" .Values.ingress.tls.enabled) .Values.ingress.host | quote }}
  {{- end }}

  {{- if .Values.proxy.pdpUrl }}
  MCP_PROXY_PDP_URL: {{ .Values.proxy.pdpUrl | quote }}
  {{- end }}

  {{- if .Values.proxy.orgId }}
  MCP_PROXY_ORG_ID: {{ .Values.proxy.orgId | quote }}
  {{- end }}

  # ADR-014 — nginx sidecar TLS material. Empty when nginx.enabled=false
  # so the lifespan skips the cert-provisioning path (no consumer to
  # serve the certs to).
  {{- if .Values.nginx.enabled }}
  MCP_PROXY_NGINX_CERT_DIR: {{ .Values.nginx.certDir | quote }}
  MCP_PROXY_NGINX_SAN: {{ .Values.nginx.san | quote }}
  {{- else }}
  MCP_PROXY_NGINX_CERT_DIR: ""
  {{- end }}

  # ADR-001 Phase 2 — SPIFFE routing decision. trust_domain is the SPIFFE
  # trust domain this proxy serves; intra_org_routing gates the new routing
  # decision (default off — Phase 3 wires real local delivery).
  PROXY_TRUST_DOMAIN: {{ .Values.proxy.trustDomain | default "cullis.local" | quote }}
  PROXY_INTRA_ORG: {{ .Values.proxy.intraOrgRouting | default false | quote }}

  MCP_PROXY_ALLOWED_ORIGINS: {{ .Values.proxy.allowedOrigins | quote }}

  # PROXY_DB_URL is the canonical name (ADR-001 Phase 1.3). The legacy
  # MCP_PROXY_DATABASE_URL is kept so older proxy images still pick the
  # value up — the runtime takes PROXY_DB_URL as authoritative when both
  # are set.
  PROXY_DB_URL: {{ include "cullis-mastio.databaseUrl" . | quote }}
  MCP_PROXY_DATABASE_URL: {{ include "cullis-mastio.databaseUrl" . | quote }}

  {{- if .Values.vault.enabled }}
  MCP_PROXY_SECRET_BACKEND: "vault"
  MCP_PROXY_VAULT_ADDR: {{ .Values.vault.addr | quote }}
  MCP_PROXY_VAULT_SECRET_PREFIX: {{ .Values.vault.secretPrefix | quote }}
  {{- else }}
  MCP_PROXY_SECRET_BACKEND: "env"
  {{- end }}
