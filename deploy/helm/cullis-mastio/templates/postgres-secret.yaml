{{- /*
Wave B F3 (audit 2026-05-11) — persists the auto-generated random
password so ``helm upgrade`` keeps the same credential.

The ``cullis-mastio.postgresPassword`` helper looks up THIS Secret
on every render: if found, reuse the persisted value; if missing,
``randAlphaNum 32`` mints a fresh one and the same Secret is
rendered with that value, so the next render reuses it.

Pre-fix the postgres password was an inline literal in values.yaml
(``cullis-mastio-dev-password``) — every fresh install had the same
world-known DB password.
*/}}
{{- if .Values.postgres.internal }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-postgres-secret" (include "cullis-mastio.fullname" .) }}
  labels:
    {{- include "cullis-mastio.postgres.labels" . | nindent 4 }}
type: Opaque
data:
  password: {{ include "cullis-mastio.postgresPassword" . | b64enc | quote }}
{{- end }}
