apiVersion: v1
kind: Service
metadata:
  name: {{ include "cullis-mastio.proxy.fullname" . }}
  labels:
    {{- include "cullis-mastio.proxy.labels" . | nindent 4 }}
  {{- with .Values.proxy.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.proxy.service.type }}
  ports:
    # ADR-014 — clients reach the Mastio through the nginx sidecar's TLS+mTLS
    # when nginx.enabled is true; otherwise the Service hands plain HTTP
    # straight to the proxy on 9100 (TLS termination expected upstream).
    {{- if .Values.nginx.enabled }}
    - name: https
      port: {{ .Values.proxy.service.port }}
      targetPort: https
      protocol: TCP
      appProtocol: https
    {{- else }}
    - name: http
      port: {{ .Values.proxy.containerPort }}
      targetPort: http
      protocol: TCP
      appProtocol: http
    {{- end }}
  selector:
    {{- include "cullis-mastio.proxy.selectorLabels" . | nindent 4 }}
