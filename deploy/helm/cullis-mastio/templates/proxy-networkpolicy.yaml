{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cullis-mastio.proxy.fullname" . }}
  labels:
    {{- include "cullis-mastio.proxy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "cullis-mastio.proxy.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Ingress controller namespace — the nginx ingress controller reaches
    # the proxy dashboard and ingress/egress APIs.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace | quote }}
      ports:
        - protocol: TCP
          port: {{ .Values.proxy.containerPort }}
    {{- if .Values.networkPolicy.brokerNamespace }}
    # Allow the broker (when deployed in the same cluster) to call the
    # /pdp/policy webhook on this proxy.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.brokerNamespace | quote }}
      ports:
        - protocol: TCP
          port: {{ .Values.proxy.containerPort }}
    {{- end }}
    {{- with .Values.networkPolicy.extraIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Broker uplink over HTTPS (and plain HTTP for dev; tighten with
    # extraEgress/ipBlock when the broker IP is known).
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.0.0/16
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 8000
    {{- if .Values.vault.enabled }}
    # Vault API (external). Restrict via extraEgress in production.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.0.0/16
      ports:
        - protocol: TCP
          port: 8200
    {{- end }}
    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
