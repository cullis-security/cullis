apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cullis-mastio.proxy.fullname" . }}
  labels:
    {{- include "cullis-mastio.proxy.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.proxy.replicaCount }}
  {{- end }}
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # Roll one pod at a time so /readyz draining always keeps an
      # available endpoint behind the Service.
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "cullis-mastio.proxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cullis-mastio.proxy.selectorLabels" . | nindent 8 }}
        {{- with .Values.proxy.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        # Roll the Deployment when ConfigMap or Secret content changes so
        # graceful drain is observed for every config rotation.
        checksum/config: {{ include (print $.Template.BasePath "/proxy-configmap.yaml") . | sha256sum }}
        {{- if .Values.secrets.create }}
        checksum/secret: {{ include (print $.Template.BasePath "/proxy-secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.proxy.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "cullis-mastio.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.proxy.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.proxy.podSecurityContext | nindent 8 }}
      {{- else if .Values.nginx.enabled }}
      # ADR-014 default — proxyuser is gid 999 in the Mastio image.
      # fsGroup makes the shared nginx-certs emptyDir group-readable +
      # writable so first-boot (proxy container, runs as proxyuser) can
      # drop the Org CA + leaf into the volume that the nginx sidecar
      # mounts read-only. Only relevant when the sidecar is enabled.
      securityContext:
        fsGroup: 999
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.proxy.terminationGracePeriodSeconds }}
      {{- with .Values.proxy.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.proxy.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.proxy.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: proxy
          image: {{ include "cullis-mastio.image" . }}
          imagePullPolicy: {{ .Values.proxy.image.pullPolicy }}
          {{- with .Values.proxy.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.proxy.containerPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "cullis-mastio.configMapName" . }}
            {{- if or .Values.secrets.create .Values.secrets.existingSecret }}
            - secretRef:
                name: {{ include "cullis-mastio.secretName" . }}
            {{- end }}
            {{- with .Values.proxy.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            {{- if .Values.proxy.brokerCaBundle }}
            # Broker CA bundle — consumed by stdlib ssl + httpx via certifi.
            - name: SSL_CERT_FILE
              value: {{ .Values.proxy.brokerCaBundle | quote }}
            - name: REQUESTS_CA_BUNDLE
              value: {{ .Values.proxy.brokerCaBundle | quote }}
            {{- end }}
            {{- with .Values.proxy.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.proxy.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.proxy.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.proxy.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.proxy.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          lifecycle:
            preStop:
              exec:
                # Give kube-proxy / endpoints controller time to remove the
                # pod from the Service before uvicorn receives SIGTERM.
                command:
                  - /bin/sh
                  - -c
                  - sleep {{ .Values.proxy.preStopSleepSeconds }}
          volumeMounts:
            {{- if not (include "cullis-mastio.usesPostgres" .) }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            {{- if .Values.nginx.enabled }}
            # ADR-014 — proxy writes the Org CA + nginx server cert into
            # this dir at first-boot; the sidecar reads it.
            - name: nginx-certs
              mountPath: /var/lib/mastio/nginx-certs
            {{- end }}
            {{- with .Values.proxy.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- if .Values.nginx.enabled }}
        # ADR-014 — TLS termination + mTLS gate sidecar
        - name: mastio-nginx
          image: "{{ .Values.nginx.image.repository }}:{{ .Values.nginx.image.tag }}"
          imagePullPolicy: {{ .Values.nginx.image.pullPolicy }}
          ports:
            - name: https
              containerPort: 9443
              protocol: TCP
          volumeMounts:
            - name: nginx-certs
              mountPath: /etc/nginx/certs
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
              readOnly: true
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - >-
                  test -s /etc/nginx/certs/mastio-server.crt &&
                  test -s /etc/nginx/certs/org-ca.crt &&
                  wget -q --no-check-certificate -O /dev/null https://127.0.0.1:9443/health
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - wget -q --no-check-certificate -O /dev/null https://127.0.0.1:9443/health
            initialDelaySeconds: 30
            periodSeconds: 30
          {{- with .Values.nginx.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
      volumes:
        {{- if not (include "cullis-mastio.usesPostgres" .) }}
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "cullis-mastio.pvcName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
        {{- if .Values.nginx.enabled }}
        # ADR-014 — shared scratch volume between proxy + nginx sidecar.
        # Plain disk-backed emptyDir: ``medium: Memory`` interacts poorly
        # with fsGroup-based ownership in some kubelet versions and
        # ``sizeLimit`` is advisory on tmpfs. Cert is ~3 KB; storage cost
        # is noise.
        - name: nginx-certs
          emptyDir: {}
        - name: nginx-conf
          configMap:
            name: {{ include "cullis-mastio.proxy.fullname" . }}-nginx
        {{- end }}
        {{- with .Values.proxy.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
