{{- if .Values.proxy.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cullis-mastio.serviceAccountName" . }}
  labels:
    {{- include "cullis-mastio.proxy.labels" . | nindent 4 }}
  {{- with .Values.proxy.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
