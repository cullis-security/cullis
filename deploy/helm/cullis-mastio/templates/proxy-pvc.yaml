{{- /*
Skip PVC entirely when the proxy is configured for Postgres — SQLite path is
unused and the volume would just dangle. ADR-001 Phase 1.4.
*/ -}}
{{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) (not (include "cullis-mastio.usesPostgres" .)) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "cullis-mastio.pvcName" . }}
  labels:
    {{- include "cullis-mastio.proxy.labels" . | nindent 4 }}
  annotations:
    # Keep the claim (and thus the SQLite data) if the release is deleted.
    helm.sh/resource-policy: keep
spec:
  accessModes:
    {{- toYaml .Values.persistence.accessModes | nindent 4 }}
  {{- if .Values.persistence.storageClassName }}
  storageClassName: {{ .Values.persistence.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
{{- end }}
