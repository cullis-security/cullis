# Cullis Helm chart — default values.
#
# This file is tuned for PRODUCTION deployments on managed Kubernetes
# (EKS, GKE, AKS) with external Postgres (RDS/CloudSQL), external Redis
# (ElastiCache/Memorystore) and external HashiCorp Vault. Do not enable
# the in-cluster StatefulSets on prod — they exist for `kind`/`minikube`
# development clusters only (see values-dev.yaml).
#
# Any value marked REQUIRED must be overridden via --set or a custom
# values file before `helm install` on a real cluster.

# -- Override the chart name (defaults to chart metadata name).
nameOverride: ""
# -- Override the fully-qualified release name (defaults to release-name-chart).
fullnameOverride: ""

# -- Global image pull secrets applied to every workload in the chart.
imagePullSecrets: []
  # - name: ghcr-credentials

# ---------------------------------------------------------------------------
# Broker — the Cullis FastAPI/uvicorn workload.
# ---------------------------------------------------------------------------
broker:
  image:
    # -- Container image repository for the broker.
    repository: ghcr.io/daenaihax/cullis
    # -- Image tag. When empty the chart appVersion is used.
    tag: ""
    # -- Image pull policy.
    pullPolicy: IfNotPresent

  # -- Static replica count (ignored when autoscaling is enabled).
  replicaCount: 2

  # -- Value for ENVIRONMENT env var (development | production).
  environment: production

  # -- Value for LOG_FORMAT env var (text | json). Use json for SIEM.
  logFormat: json

  # -- Container port the broker listens on. Must match the Dockerfile.
  containerPort: 8000

  # -- CPU/memory resource requests and limits.
  resources:
    limits:
      cpu: "1000m"
      memory: "1Gi"
    requests:
      cpu: "200m"
      memory: "256Mi"

  # -- Grace period for pod termination. Must be >= item 4 drain budget
  # (5s drain + 30s uvicorn graceful timeout + buffer). See README.
  terminationGracePeriodSeconds: 40

  # -- Toggle Prometheus /metrics endpoint inside the broker.
  # Required by the PrometheusRule and ServiceMonitor below.
  prometheusEnabled: true

  # -- Arbitrary extra environment variables merged into the broker
  # Deployment container. Use for OIDC, KMS, policy backend, etc.
  # Each entry must be a full Kubernetes env var object (name/value or
  # name/valueFrom). Keep *secrets* out of here — use broker.extraEnvFrom
  # or the broker Secret below.
  extraEnv: []
    # - name: OIDC_ISSUER_URL
    #   value: "https://login.example.com/realms/cullis"
    # - name: OIDC_CLIENT_ID
    #   value: "cullis-broker"
    #
    # --- Vault over HTTPS with an internal enterprise CA ---
    # When your external Vault uses a certificate signed by a private CA,
    # mount the CA bundle via extraVolumes/extraVolumeMounts (see below)
    # and point VAULT_CACERT at the resulting path so hvac verifies TLS:
    # - name: VAULT_CACERT
    #   value: "/etc/ssl/certs/vault-ca.pem"
    #
    # --- Expose the pod namespace (used by OIDC / Kubernetes auth) ---
    # - name: POD_NAMESPACE
    #   valueFrom:
    #     fieldRef:
    #       fieldPath: metadata.namespace

  # -- Additional envFrom sources (e.g. External Secret-backed Secrets).
  # Use this when the ExternalSecrets Operator, CSI Secret Store, or
  # SealedSecrets controller materialises the broker secrets under a
  # different Secret than the chart-rendered one.
  extraEnvFrom: []
    # - secretRef:
    #     name: cullis-external-secrets
    # - secretRef:
    #     name: cullis-db-url        # ExternalSecret with DATABASE_URL
    # - secretRef:
    #     name: cullis-vault-token   # CSI-mounted Vault token

  # -- Volumes injected into the broker pod. Loops via `range` over the
  # full list so every Kubernetes Volume source (ConfigMap, Secret,
  # emptyDir, projected, CSI, etc.) is supported. Combined with any
  # volume mounted via `pki.existingSecret` below.
  extraVolumes: []
    #
    # --- Pattern 1: mount an internal-CA bundle for Vault HTTPS ---
    # Create a ConfigMap holding the PEM first, e.g.:
    #   kubectl -n cullis create configmap vault-ca \
    #     --from-file=ca.pem=/path/to/internal-root-ca.pem
    # - name: vault-ca
    #   configMap:
    #     name: vault-ca
    #     items:
    #       - key: ca.pem
    #         path: vault-ca.pem
    #
    # --- Pattern 2: External Secrets Operator — file-mode secret ---
    # Useful for OIDC JWKS files, signing keys, or mTLS material that
    # the broker expects on disk rather than as env vars.
    # - name: cullis-oidc-jwks
    #   secret:
    #     secretName: cullis-oidc-jwks   # rendered by an ExternalSecret
    #     defaultMode: 0400
    #
    # --- Pattern 3: Vault Agent Injector sidecar output ---
    # When using the hashicorp/vault-agent-injector mutating webhook,
    # the agent writes rendered secrets into this shared emptyDir.
    # Annotate the pod via broker.podAnnotations instead of configuring
    # the volume; the injector mounts it for you. Only enumerate it here
    # if you prefer the explicit form (e.g. deterministic rendering).
    # - name: vault-agent-output
    #   emptyDir:
    #     medium: Memory
    #
    # --- Pattern 4: writable /tmp when readOnlyRootFilesystem=true ---
    # REQUIRED if you flip broker.securityContext.readOnlyRootFilesystem
    # to true. uvicorn, httpx and Pydantic may write short-lived files
    # (TLS session cache, multipart spool) under /tmp.
    # - name: tmp
    #   emptyDir: {}
    # - name: cache
    #   emptyDir: {}

  # -- Volume mounts for the broker container. One entry per name in
  # extraVolumes. The rendered Deployment loops `toYaml` over this list,
  # so any standard VolumeMount field (subPath, readOnly, mountPropagation)
  # is supported.
  extraVolumeMounts: []
    # --- Matches Pattern 1 above: CA for Vault ---
    # - name: vault-ca
    #   mountPath: /etc/ssl/certs/vault-ca.pem
    #   subPath: vault-ca.pem
    #   readOnly: true
    #
    # --- Matches Pattern 2 above: OIDC JWKS ---
    # - name: cullis-oidc-jwks
    #   mountPath: /var/run/secrets/cullis/oidc
    #   readOnly: true
    #
    # --- Matches Pattern 4 above: writable /tmp + cache ---
    # - name: tmp
    #   mountPath: /tmp
    # - name: cache
    #   mountPath: /var/cache/cullis

  # -- Broker PKI (the root CA used to sign agent certificates).
  #
  # The broker's Settings() expects `broker-ca.pem` + `broker-ca-key.pem`
  # on disk at `pki.mountPath`. Two ways to populate them:
  #
  #   1. BYOCA (production-preferred) — create a Kubernetes Secret
  #      out-of-band with those two keys and set `pki.existingSecret`
  #      to its name. The chart will mount it read-only.
  #
  #   2. Bootstrap (evaluation / dev clusters) — flip
  #      `pki.bootstrap.enabled=true` and the chart will render a Job
  #      that generates a fresh self-signed CA on first install, writes
  #      it into a Secret, and (optionally) pushes it into Vault so
  #      KMS_BACKEND=vault resolves without manual `kubectl exec`.
  pki:
    # -- Name of an existing Secret holding `broker-ca.pem` +
    # `broker-ca-key.pem`. Leave empty to rely on bootstrap below
    # or to hand-wire via extraVolumes / extraVolumeMounts.
    existingSecret: ""
    # -- Mount path for the CA Secret. Must match the broker's
    # Settings().broker_ca_cert_path which defaults to `certs/` relative
    # to WORKDIR=/app, i.e. /app/certs.
    mountPath: /app/certs
    bootstrap:
      # -- Render a post-install Job that generates a self-signed broker
      # CA and writes it into a Secret. OFF by default — production
      # deployments should ship a CA via existingSecret. Useful for
      # evaluating on kind/k3d and for hermetic CI.
      enabled: false
      # -- Name of the Secret the Job creates / updates. When empty the
      # chart derives it from the release name. The same value is mounted
      # into the broker when existingSecret is also empty, so the default
      # is "bootstrap creates it AND broker consumes it".
      secretName: ""
      # -- Key algorithm for the generated CA ("rsa" | "ec"). ec = P-256,
      # rsa = 4096-bit.
      keyType: rsa
      # -- Also push the generated PEMs into Vault at VAULT_SECRET_PATH.
      # Required when KMS_BACKEND=vault (the default). Disable only when
      # running with KMS_BACKEND=local.
      pushToVault: true
      # -- Image used by the Job. Reuses the broker image by default
      # because it already ships cryptography + httpx. The Job only
      # reads /app/pki_bootstrap.py which is mounted from a ConfigMap
      # the chart renders next to this Job.
      image:
        repository: ""   # defaults to broker.image.repository
        tag: ""          # defaults to broker.image.tag (chart appVersion)
        pullPolicy: IfNotPresent
      # -- Resources for the short-lived bootstrap Job.
      resources:
        limits:
          cpu: "500m"
          memory: "256Mi"
        requests:
          cpu: "50m"
          memory: "64Mi"

  # -- Additional annotations on broker pods. Common use:
  #    - Vault Agent Injector (vault.hashicorp.com/agent-inject: "true")
  #    - Istio / Linkerd sidecar opt-in / opt-out
  #    - checksum annotations for downstream GitOps tooling
  podAnnotations: {}
    # vault.hashicorp.com/agent-inject: "true"
    # vault.hashicorp.com/role: "cullis-broker"
    # vault.hashicorp.com/agent-inject-secret-database-url: "secret/data/cullis/db"
  # -- Additional labels on broker pods.
  podLabels: {}

  # -- Security context applied to the broker Pod. The default is
  # intentionally restrictive (non-root, seccomp RuntimeDefault) and
  # matches the Kubernetes Pod Security Standard `restricted` profile.
  # Flip to looser defaults only if you have a concrete reason.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    # -- Apply the container-runtime default seccomp profile. Required
    # by PSS `restricted` and by most managed Kubernetes baselines.
    seccompProfile:
      type: RuntimeDefault
    # -- Supplementary GIDs. Leave as an empty list unless your cluster
    # injects additional groups via a PodSecurityPolicy replacement.
    # supplementalGroups: []
    # -- Additional group ownership change policy for mounted volumes.
    # `OnRootMismatch` avoids relabelling every file on every restart
    # and is recommended for large PVCs. Uncomment to enable.
    # fsGroupChangePolicy: OnRootMismatch

  # -- Security context applied to the broker container. Defaults match
  # the Pod Security Standard `restricted` profile **except** for
  # readOnlyRootFilesystem, which is left false so that the chart works
  # out of the box with a stock broker image. To flip it to `true` for
  # production hardening, see the example block right below.
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
    # --- Hardened production variant ---
    # Uncomment the whole `securityContext` block above and replace with
    # the snippet below. You MUST also add tmp + cache emptyDir volumes
    # to broker.extraVolumes / broker.extraVolumeMounts (see Pattern 4
    # in the extraVolumes section above) otherwise the broker will fail
    # on startup when it tries to write to /tmp.
    #
    # allowPrivilegeEscalation: false
    # readOnlyRootFilesystem: true
    # runAsNonRoot: true
    # runAsUser: 1000
    # capabilities:
    #   drop:
    #     - ALL
    # seccompProfile:
    #   type: RuntimeDefault

  # -- Node selector for broker pods.
  nodeSelector: {}
  # -- Tolerations for broker pods.
  tolerations: []
  # -- Affinity for broker pods. Default anti-affinity spreads replicas
  # across nodes for HA during a node-drain event.
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: cullis
                app.kubernetes.io/component: broker

  # -- Liveness probe configuration. Hits /healthz.
  livenessProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3

  # -- Readiness probe configuration. Hits /readyz — during graceful
  # shutdown this endpoint returns 503 so the Service removes the pod
  # from its endpoints list before SIGTERM hits uvicorn.
  readinessProbe:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1

  # -- Startup probe (optional — useful on first migration run).
  startupProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 30

  # -- preStop hook. Sleep gives Kubernetes time to propagate the pod
  # removal through the Service endpoints before uvicorn gets SIGTERM.
  preStopSleepSeconds: 5

  service:
    # -- Service type. Keep ClusterIP and front it with the Ingress.
    type: ClusterIP
    # -- Service port exposed to the Ingress controller.
    port: 8000
    # -- Extra annotations on the broker Service.
    annotations: {}

  serviceAccount:
    # -- Create a dedicated ServiceAccount for the broker.
    create: true
    # -- Name of the ServiceAccount. Auto-generated when empty.
    name: ""
    # -- Extra annotations on the ServiceAccount (e.g. IRSA role ARN,
    # GKE Workload Identity SA).
    annotations: {}

# ---------------------------------------------------------------------------
# Secrets (rendered into a Kubernetes Secret). Prefer wiring via SealedSecret
# or ExternalSecret — see README for examples. The values here are the
# last-resort path for quick installs.
# ---------------------------------------------------------------------------
secrets:
  # -- When false the chart will NOT create the broker Secret and will
  # instead expect a user-managed Secret with the same name (see
  # secrets.existingSecret).
  create: true
  # -- Name of a user-managed Secret to bind to the Deployment instead
  # of the one generated by this chart. Useful with SealedSecrets /
  # ExternalSecrets / CSI secret providers.
  existingSecret: ""
  # -- Strong random value for the admin console HMAC and as initial
  # admin password. REQUIRED in production. Generate with:
  #   openssl rand -hex 32
  adminSecret: ""
  # -- Separate key for dashboard cookie signing. Auto-generated by the
  # broker when empty; set explicitly to support zero-downtime rotations.
  dashboardSigningKey: ""
  # -- OIDC client secret (only used when OIDC env vars are configured).
  oidcClientSecret: ""
  # -- Vault token fallback when not using Kubernetes Auth / IRSA.
  vaultToken: ""
  # -- Anthropic API key used by the LLM injection judge (optional).
  anthropicApiKey: ""
  # -- Extra raw secret entries. Each key becomes an env var in the pod.
  extra: {}

# ---------------------------------------------------------------------------
# External Postgres — default. Internal StatefulSet only on dev clusters.
# ---------------------------------------------------------------------------
postgres:
  # -- Set to true to run a single-node Postgres StatefulSet inside the
  # cluster (dev only — no HA, no backups). For production use RDS /
  # CloudSQL / Crunchy Operator and leave this false.
  internal: false
  # -- Full SQLAlchemy async URL for an external Postgres instance.
  # REQUIRED when internal: false.
  # Example: postgresql+asyncpg://cullis:secret@cullis-db.cluster.eu-west-1.rds.amazonaws.com:5432/cullis
  externalUrl: ""
  # -- Name of an existing Secret holding the database URL under key
  # `database-url`. Overrides externalUrl when set.
  existingSecret: ""

  # Only used when internal: true — settings for the bundled dev StatefulSet.
  image: postgres:16-alpine
  storageSize: 20Gi
  storageClassName: ""
  # -- Superuser credentials for the in-cluster Postgres.
  username: cullis
  password: cullis-dev-password
  database: cullis
  # -- Port the in-cluster Postgres listens on.
  port: 5432
  resources:
    limits:
      cpu: "1000m"
      memory: "1Gi"
    requests:
      cpu: "200m"
      memory: "256Mi"

# ---------------------------------------------------------------------------
# External Redis — default.
# ---------------------------------------------------------------------------
redis:
  # -- Set to true to run a single-node Redis StatefulSet inside the
  # cluster (dev only). For production use ElastiCache / Memorystore or
  # a managed Redis Cluster and leave this false.
  internal: false
  # -- Full Redis URL. REQUIRED when internal: false.
  # Example: rediss://:secret@cullis-redis.xxx.cache.amazonaws.com:6379/0
  externalUrl: ""
  # -- Name of an existing Secret holding the redis URL under key
  # `redis-url`. Overrides externalUrl when set.
  existingSecret: ""

  # Only used when internal: true.
  image: redis:7-alpine
  port: 6379
  storageSize: 5Gi
  storageClassName: ""
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"

# ---------------------------------------------------------------------------
# External Vault — default.
# ---------------------------------------------------------------------------
vault:
  # -- Set to true to run a single-node Vault dev StatefulSet inside the
  # cluster. For production use an external Vault cluster and bind the
  # broker via Kubernetes auth (projected token) or IRSA.
  internal: false
  # -- Address of the external Vault (e.g. https://vault.corp:8200).
  # REQUIRED when internal: false.
  externalAddr: ""
  # -- Name of a Secret containing the Vault token under key
  # `vault-token`. Leave empty to use Kubernetes auth instead.
  externalTokenSecretName: ""
  # -- KMS backend mode. `vault` uses Vault KV v2, `local` writes to the
  # pod filesystem (NOT production-safe).
  kmsBackend: vault
  # -- Vault KV v2 path used by the broker.
  secretPath: "secret/data/broker"

  # Only used when internal: true.
  image: hashicorp/vault:1.17
  port: 8200
  storageSize: 2Gi
  storageClassName: ""
  # -- Dev root token for the in-cluster Vault. Do NOT ship to prod.
  devRootToken: "dev-root-token"

# ---------------------------------------------------------------------------
# Jaeger all-in-one (optional). Use only for dev/demo. In production push
# OTLP traces to your existing observability platform via otel env vars.
# ---------------------------------------------------------------------------
jaeger:
  enabled: false
  image: jaegertracing/all-in-one:1.57
  otlpGrpcPort: 4317
  uiPort: 16686

# ---------------------------------------------------------------------------
# Ingress — cert-manager TLS termination with websocket-friendly annotations.
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  # -- Public hostname for the broker.
  host: cullis.example.com
  # -- Path prefix exposed by the Ingress.
  path: /
  # -- Path type (Prefix | Exact | ImplementationSpecific).
  pathType: Prefix
  # -- Extra Ingress annotations merged with the websocket/TLS defaults
  # rendered by the chart. The chart already emits the correct
  # `cert-manager.io/cluster-issuer` annotation when tls.enabled and
  # tls.certManagerIssuer are set — so you only need to add annotations
  # here for extras like HSTS, rate-limits or ACME HTTP-01 tuning.
  annotations: {}
    # --- ACME HTTP-01 via cert-manager on nginx ---
    # kubernetes.io/tls-acme: "true"
    # acme.cert-manager.io/http01-edit-in-place: "true"
    #
    # --- HSTS (1 year) + force https ---
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # nginx.ingress.kubernetes.io/hsts: "true"
    # nginx.ingress.kubernetes.io/hsts-max-age: "31536000"
    # nginx.ingress.kubernetes.io/hsts-include-subdomains: "true"
    #
    # --- AWS ALB ingress variant (when switching away from nginx) ---
    # alb.ingress.kubernetes.io/scheme: internet-facing
    # alb.ingress.kubernetes.io/target-type: ip
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:eu-west-1:…:certificate/…
  tls:
    enabled: true
    # -- Name of the cert-manager ClusterIssuer or Issuer. The chart
    # emits `cert-manager.io/<lower issuerKind>: <name>` as an Ingress
    # annotation when both certManagerIssuer and certManagerIssuerKind
    # are set. Typical values:
    #   - letsencrypt-prod / letsencrypt-staging (public ACME)
    #   - internal-ca                            (private CA Issuer)
    #   - vault-issuer                           (cert-manager + Vault PKI)
    # Leave empty to skip cert-manager wiring entirely; you must then
    # pre-provision a TLS Secret and reference it via tls.secretName.
    certManagerIssuer: letsencrypt-prod
    # -- Kind of issuer — `ClusterIssuer` (default) or `Issuer`.
    certManagerIssuerKind: ClusterIssuer
    # -- Name of the TLS Secret to reference in the Ingress. When empty
    # the chart generates one from the release name and host. Set this
    # explicitly when BYO-cert (imported via SealedSecret/ExternalSecret)
    # or when reusing a wildcard cert across multiple ingresses.
    secretName: ""

# ---------------------------------------------------------------------------
# Monitoring — Prometheus Operator integration (PrometheusRule +
# ServiceMonitor). Disable if you are not running Prometheus Operator.
# ---------------------------------------------------------------------------
monitoring:
  prometheusRule:
    # -- Render PrometheusRule CRD holding the Cullis alert rules.
    enabled: true
    # -- Extra labels on the PrometheusRule (Prometheus Operator selector).
    labels: {}
      # prometheus: kube-prometheus
      # role: alert-rules
    # -- Extra annotations on the PrometheusRule.
    annotations: {}
  serviceMonitor:
    # -- Render ServiceMonitor CRD pointing at /metrics.
    enabled: true
    # -- Scrape interval.
    interval: 30s
    # -- Scrape timeout.
    scrapeTimeout: 10s
    # -- Extra labels on the ServiceMonitor (Prometheus Operator selector).
    labels: {}
      # release: kube-prometheus-stack
    # -- Extra labels applied to every scraped metric.
    targetLabels: []
    # -- Metric relabel configs.
    metricRelabelings: []
    # -- Relabel configs.
    relabelings: []

# ---------------------------------------------------------------------------
# NetworkPolicy — ingress from the nginx ingress namespace only, egress to
# DB/Redis/Vault/PDP webhook + DNS/HTTPS.
# ---------------------------------------------------------------------------
networkPolicy:
  enabled: true
  # -- Namespace where the ingress controller runs (used for ingress
  # NetworkPolicy selector).
  ingressNamespace: ingress-nginx
  # -- Extra egress rules merged with the defaults (DB/Redis/Vault/DNS).
  # Add your PDP webhook target here when it lives outside the cluster.
  #
  # TIGHTENING THE DEFAULTS (production):
  # The chart's default egress allows 0.0.0.0/0 on the DB/Redis/Vault
  # ports because the chart cannot guess your VPC CIDRs. For a strict
  # production deployment, restrict egress to only:
  #   - the RDS / CloudSQL security-group CIDR on 5432
  #   - the ElastiCache / Memorystore CIDR on 6379
  #   - the Vault cluster LB CIDR on 8200
  #   - the OIDC issuer / JWKS URL on 443
  #   - the PDP webhook target
  # A clean pattern is to set postgres/redis/vault externalUrl pointing
  # at in-VPC DNS and then fence the NetworkPolicy via extraEgress.
  # (The chart-emitted 0.0.0.0/0 rules remain but you should swap them
  # for CIDR-scoped ones by editing the NetworkPolicy template in a
  # downstream fork, or by setting *.internal=true with a stub service.)
  extraEgress: []
    # --- PDP webhook living outside the cluster ---
    # - to:
    #     - ipBlock:
    #         cidr: 10.100.0.0/16
    #   ports:
    #     - protocol: TCP
    #       port: 8181
    #
    # --- OIDC issuer reachable over a private hosted zone ---
    # - to:
    #     - ipBlock:
    #         cidr: 10.0.0.0/16
    #   ports:
    #     - protocol: TCP
    #       port: 443
    #
    # --- Allow egress only to a named namespace (e.g. monitoring) ---
    # - to:
    #     - namespaceSelector:
    #         matchLabels:
    #           kubernetes.io/metadata.name: monitoring
    #   ports:
    #     - protocol: TCP
    #       port: 9093     # Alertmanager

# ---------------------------------------------------------------------------
# Autoscaling — HPA on CPU utilisation. Plays nicely with broker.replicaCount
# because when autoscaling.enabled the Deployment replicas field is
# delegated to the HPA minReplicas.
# ---------------------------------------------------------------------------
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  # -- Optional additional metric (e.g. memory). Leave empty to disable.
  targetMemoryUtilizationPercentage: 0

# ---------------------------------------------------------------------------
# PodDisruptionBudget — protects the broker during voluntary drains.
# ---------------------------------------------------------------------------
podDisruptionBudget:
  enabled: true
  minAvailable: 1
  # -- Use maxUnavailable instead of minAvailable when not empty.
  maxUnavailable: ""
