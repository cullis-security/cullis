apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cullis.broker.fullname" . }}
  labels:
    {{- include "cullis.broker.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.broker.replicaCount }}
  {{- end }}
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # Roll one pod at a time so /readyz draining always keeps an
      # available endpoint behind the Service.
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "cullis.broker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cullis.broker.selectorLabels" . | nindent 8 }}
        {{- with .Values.broker.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        # Roll the Deployment when ConfigMap or Secret content changes so
        # graceful drain is observed for every config rotation.
        checksum/config: {{ include (print $.Template.BasePath "/broker-configmap.yaml") . | sha256sum }}
        {{- if .Values.secrets.create }}
        checksum/secret: {{ include (print $.Template.BasePath "/broker-secret.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.broker.prometheusEnabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.broker.containerPort | quote }}
        prometheus.io/path: "/metrics"
        {{- end }}
        {{- with .Values.broker.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "cullis.broker.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.broker.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.broker.terminationGracePeriodSeconds }}
      {{- with .Values.broker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.broker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.broker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: broker
          image: {{ include "cullis.broker.image" . }}
          imagePullPolicy: {{ .Values.broker.image.pullPolicy }}
          {{- with .Values.broker.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.broker.containerPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "cullis.broker.configMapName" . }}
            {{- if or .Values.secrets.create .Values.secrets.existingSecret }}
            - secretRef:
                name: {{ include "cullis.broker.secretName" . }}
            {{- end }}
            {{- with .Values.broker.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.broker.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.broker.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.broker.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.broker.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.broker.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          lifecycle:
            preStop:
              exec:
                # Give kube-proxy / endpoints controller time to remove the
                # pod from the Service before uvicorn receives SIGTERM.
                # Item 4 of the production plan: aligned with /readyz
                # draining and graceful_timeout in app/main.py.
                command:
                  - /bin/sh
                  - -c
                  - sleep {{ .Values.broker.preStopSleepSeconds }}
          {{- if or .Values.broker.pki.existingSecret .Values.broker.extraVolumeMounts }}
          volumeMounts:
            {{- if .Values.broker.pki.existingSecret }}
            # Mount the pre-existing PKI Secret at /app/certs where
            # the broker's Settings() expects broker-ca.pem and
            # broker-ca-key.pem by default. BYOCA pattern — the
            # customer creates this Secret separately.
            - name: broker-pki
              mountPath: {{ .Values.broker.pki.mountPath }}
              readOnly: true
            {{- end }}
            {{- with .Values.broker.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- if or .Values.broker.pki.existingSecret .Values.broker.extraVolumes }}
      volumes:
        {{- if .Values.broker.pki.existingSecret }}
        - name: broker-pki
          secret:
            secretName: {{ .Values.broker.pki.existingSecret }}
            defaultMode: 0400
        {{- end }}
        {{- with .Values.broker.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
