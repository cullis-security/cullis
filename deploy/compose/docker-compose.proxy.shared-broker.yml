# =============================================================================
# Override — bring the Mastio up federated, sharing the Court's docker network
# =============================================================================
#
# Usage:
#   docker compose -f docker-compose.proxy.yml \
#                  -f docker-compose.proxy.shared-broker.yml up -d
#
# Or:
#   ./deploy_proxy.sh --shared-broker
#
# What this changes vs the base compose:
#   - Swaps the private ``proxy_net`` bridge for the broker's external
#     ``cullis-broker_default`` network so the broker can call the
#     proxy's PDP webhook by service name and the proxy can resolve
#     ``broker:8000`` over docker DNS.
#   - Sets MCP_PROXY_STANDALONE=false so the lifespan brings up
#     BrokerBridge + the reverse-proxy httpx client (federated mode).
#   - Defaults MCP_PROXY_BROKER_URL / MCP_PROXY_BROKER_JWKS_URL to the
#     in-compose service name so dev just works; production overrides
#     via proxy.env.
#
# Prerequisites:
#   - Broker compose project up (cullis-broker_default network exists).
#     ./deploy_broker.sh --dev creates it.
#
# Requires Compose v2.20+ for the !reset / !override tags.
# =============================================================================

services:

  mcp-proxy:
    environment:
      MCP_PROXY_STANDALONE: "false"
      MCP_PROXY_BROKER_URL:        ${MCP_PROXY_BROKER_URL:-http://broker:8000}
      MCP_PROXY_BROKER_JWKS_URL:   ${MCP_PROXY_BROKER_JWKS_URL:-http://broker:8000/.well-known/jwks.json}
    networks: !override
      - broker_net

  # The sidecar follows the proxy onto the shared bridge so it keeps
  # talking to ``mcp-proxy:9100`` over docker DNS.
  mastio-nginx:
    networks: !override
      - broker_net

networks:
  proxy_net: !reset null
  broker_net:
    external: true
    name: cullis-broker_default
