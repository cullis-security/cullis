# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This file removes dev-only services (mock PDPs, Jaeger UI exposure)
# and adds production hardening (restart policies, resource limits, logging).

services:

  # Remove mock PDP services in production (orgs run their own)
  mock-pdp-manufacturer:
    profiles: ["dev-only"]

  mock-pdp-buyer:
    profiles: ["dev-only"]

  broker:
    restart: always
    environment:
      # ── Fail-fast on missing secrets ────────────────────────────────────
      # The :? operator makes `docker compose up` abort with a clear error
      # if any of these is empty in .env. Prevents production boots with
      # insecure defaults (the #1 cause of "oops we leaked the admin creds"
      # incidents in multi-env teams).
      ADMIN_SECRET:          ${ADMIN_SECRET:?ADMIN_SECRET is required in production .env}
      DASHBOARD_SIGNING_KEY: ${DASHBOARD_SIGNING_KEY:?DASHBOARD_SIGNING_KEY is required in production .env (run scripts/generate-env.sh --prod)}
      # Vault token must be a scoped broker-policy token, NOT the root token.
      # vault/init-vault.sh prints one after initialization.
      VAULT_TOKEN:           ${VAULT_TOKEN:?VAULT_TOKEN is required in production .env (scoped broker-policy token)}
      # ── Production hardening ────────────────────────────────────────────
      # HTTPS to Vault — docker-compose.prod.yml also boots Vault with TLS.
      VAULT_ADDR:            ${VAULT_ADDR:-https://vault:8200}
      VAULT_ALLOW_HTTP:      "false"
      # SSRF guard ON — PDP webhooks must use public DNS/IPs. If your
      # proxies legitimately sit on RFC1918 behind a VPN, override this
      # in your own env-specific compose file, not here.
      POLICY_WEBHOOK_ALLOW_PRIVATE_IPS: "false"
      # Observability
      OTEL_TRACES_SAMPLER_ARG: "0.1"
      LOG_FORMAT:              "json"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  postgres:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  redis:
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    deploy:
      resources:
        limits:
          memory: 512M

  vault:
    restart: always
    # Production mode: file storage, no dev token, manual init+unseal required.
    # First deploy: ./vault/init-vault.sh
    environment:
      VAULT_ADDR: "http://127.0.0.1:8200"
    command: vault server -config=/vault/config/config.hcl
    volumes:
      - ./vault/config.hcl:/vault/config/config.hcl:ro
      - vault-data:/vault/data
    cap_add:
      - IPC_LOCK

  nginx:
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  jaeger:
    # In production, consider using Jaeger with Elasticsearch backend
    # or an external observability platform (Grafana Tempo, Datadog, etc.)
    restart: always
    ports: []   # Don't expose Jaeger UI publicly — access via SSH tunnel or VPN

volumes:
  vault-data:
