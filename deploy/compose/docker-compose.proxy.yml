# =============================================================================
# Cullis MCP Proxy — Org-Level Gateway + Built-in PDP
# =============================================================================
#
# Default deploy = standalone Mastio on its own private docker network.
# The Mastio derives its Org CA + org_id at first boot (ADR-006 §2.2),
# the mastio-nginx sidecar (ADR-014) terminates TLS on host port 9443
# with mTLS on /v1/(egress|agents). Zero broker dependency at boot;
# federation ("allaccio al Court") is post-setup, opt-in via the
# dashboard /proxy/federation page.
#
# Operators who want to bring up the Mastio with a Court already on
# the same docker host (CI smoke, dev fixtures) layer the
# docker-compose.proxy.shared-broker.yml override on top.
#
# Usage:
#   ./deploy_proxy.sh                       # dev, standalone (default)
#   ./deploy_proxy.sh --shared-broker       # join the broker's docker net
#   ./deploy_proxy.sh --prod                # fail-fast on insecure defaults
#
# Host port 9443 is the only published port. The in-pod Mastio listener
# (9100) is reachable only via the sidecar at 127.0.0.1 inside the
# proxy_net docker network.
# =============================================================================

services:

  mcp-proxy:
    build:
      context: .
      dockerfile: mcp_proxy/Dockerfile
    # ADR-014 — no host port publish. The Mastio listens on 9100 only
    # on broker_net; the mastio-nginx sidecar below publishes 9443.
    expose:
      - "9100"
    environment:
      MCP_PROXY_ENVIRONMENT:       ${MCP_PROXY_ENVIRONMENT:-development}
      # ADR-006 — standalone is the canonical default. The Mastio derives
      # its Org CA + org_id at first-boot and runs as a self-contained
      # mini-broker. Federation is post-setup, opt-in via the dashboard.
      # The shared-broker override flips this to false.
      MCP_PROXY_STANDALONE:        ${MCP_PROXY_STANDALONE:-true}
      MCP_PROXY_ADMIN_SECRET:      ${MCP_PROXY_ADMIN_SECRET:-change-me-in-production}
      # Persistent signing key — without this, admin sessions are invalid
      # after every proxy restart (per-process random fallback).
      MCP_PROXY_DASHBOARD_SIGNING_KEY: ${MCP_PROXY_DASHBOARD_SIGNING_KEY:-}
      MCP_PROXY_DATABASE_URL:      sqlite+aiosqlite:////data/mcp_proxy.db
      # Broker uplink — empty by default in standalone. The shared-broker
      # override fills these with the in-compose service name; production
      # federated deploys set them via proxy.env.
      MCP_PROXY_BROKER_URL:        ${MCP_PROXY_BROKER_URL:-}
      MCP_PROXY_BROKER_JWKS_URL:   ${MCP_PROXY_BROKER_JWKS_URL:-}
      # PDP endpoint registered with the broker when the org onboards.
      # In standalone the broker is absent, but the value stays valid for
      # the (unused) registration code path.
      MCP_PROXY_PDP_URL:           ${MCP_PROXY_PDP_URL:-http://mcp-proxy:9100/pdp/policy}
      # Public URL the proxy advertises to its own internal agents (DPoP HTU).
      # ADR-014 — points at the nginx sidecar's TLS endpoint, not the
      # in-network mcp-proxy listener.
      MCP_PROXY_PROXY_PUBLIC_URL:  ${MCP_PROXY_PROXY_PUBLIC_URL:-https://localhost:9443}
      MCP_PROXY_ALLOWED_ORIGINS:   ${MCP_PROXY_ALLOWED_ORIGINS:-}
      # ADR-014 — TLS material for the nginx sidecar. The Mastio writes
      # the server cert + Org CA bundle into this directory at first-
      # boot; the sidecar mounts the same docker volume read-only.
      MCP_PROXY_NGINX_CERT_DIR:    ${MCP_PROXY_NGINX_CERT_DIR:-/var/lib/mastio/nginx-certs}
      MCP_PROXY_NGINX_SAN:         ${MCP_PROXY_NGINX_SAN:-mastio.local,localhost}
      # Custom CA bundle for HTTPS brokers with enterprise/internal certs.
      # SSL_CERT_FILE is honored by stdlib ssl + httpx/certifi.
      SSL_CERT_FILE:               ${MCP_PROXY_BROKER_CA_BUNDLE:-}
      REQUESTS_CA_BUNDLE:          ${MCP_PROXY_BROKER_CA_BUNDLE:-}
      # Vault (optional)
      MCP_PROXY_SECRET_BACKEND:    ${MCP_PROXY_SECRET_BACKEND:-env}
      MCP_PROXY_VAULT_ADDR:        ${MCP_PROXY_VAULT_ADDR:-}
      MCP_PROXY_VAULT_TOKEN:       ${MCP_PROXY_VAULT_TOKEN:-}
      # ADR-001 §10 — intra-org routing + transport. All read by
      # ``_apply_routing_overrides`` in mcp_proxy/config.py. Exposing
      # them here lets operators flip behaviour through proxy.env
      # without touching the compose file.
      PROXY_TRUST_DOMAIN:          ${PROXY_TRUST_DOMAIN:-}
      PROXY_INTRA_ORG:             ${PROXY_INTRA_ORG:-}
      PROXY_TRANSPORT_INTRA_ORG:   ${PROXY_TRANSPORT_INTRA_ORG:-}
      PROXY_EGRESS_INSPECTION_ENABLED: ${PROXY_EGRESS_INSPECTION_ENABLED:-}
      PROXY_FEDERATION_SYNC:       ${PROXY_FEDERATION_SYNC:-}
      # F-B-11 Phase 5 — DPoP enforcement mode for /v1/egress/*
      # (off | optional | required). optional is the current default.
      CULLIS_EGRESS_DPOP_MODE:     ${CULLIS_EGRESS_DPOP_MODE:-}
    volumes:
      - mcp_proxy_data:/data
      # Optional corporate CA mount. The env above points at a file under /certs
      # only if MCP_PROXY_BROKER_CA_BUNDLE is set, so the directory can safely
      # stay empty in dev.
      - ./certs:/certs:ro
      # ADR-014 — shared volume for nginx sidecar TLS material.
      # Mastio (this service) writes; mastio-nginx mounts ro.
      - mastio_nginx_certs:/var/lib/mastio/nginx-certs:rw
    networks:
      - proxy_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9100/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ADR-014 — TLS terminator + mTLS gate for Connector → Mastio.
  mastio-nginx:
    image: nginx:1.27-alpine
    ports:
      - "${MCP_PROXY_PORT:-9443}:9443"
    volumes:
      - ./nginx/mastio:/etc/nginx/conf.d:ro
      # The Mastio writes here at first-boot; nginx reads. The volume
      # is the only way nginx sees Org CA + leaf material; if the
      # Mastio hasn't bootstrapped yet, the files are absent and the
      # healthcheck fails closed (no half-up nginx without trust
      # material).
      - mastio_nginx_certs:/etc/nginx/certs:ro
    depends_on:
      mcp-proxy:
        condition: service_healthy
    networks:
      - proxy_net
    restart: unless-stopped
    healthcheck:
      # Verify the cert pair landed AND nginx itself is serving.
      # ``-k`` because we only check that TLS terminates; the cert is
      # self-signed off the Org CA which the curl in nginx:alpine
      # doesn't trust by default.
      test:
        - CMD-SHELL
        - >-
          test -s /etc/nginx/certs/mastio-server.crt &&
          test -s /etc/nginx/certs/mastio-server.key &&
          test -s /etc/nginx/certs/org-ca.crt &&
          wget -q --no-check-certificate -O /dev/null https://localhost:9443/health
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  # Default standalone: a private bridge owned by this compose project.
  # The shared-broker override resets this and joins ``broker_net``
  # (cullis-broker_default) instead.
  proxy_net:
    driver: bridge

volumes:
  mcp_proxy_data:
    driver: local
  # ADR-014 — Mastio writes Org CA + nginx server cert here; sidecar
  # mounts read-only. Survives compose restarts so cert reuse path
  # in ``ensure_nginx_server_cert`` short-circuits on warm boots.
  mastio_nginx_certs:
    driver: local
